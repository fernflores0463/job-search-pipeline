services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: jobsearch
      POSTGRES_USER: jobsearch
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsearch"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_NAME: jobsearch
      DB_USER: jobsearch
      DB_PASSWORD: localdev
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config.json:/app/config.json:ro

volumes:
  pgdata:
