name: Deploy Dev

on:
  push:
    branches: ['dev/**']

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: job-search-pipeline
  DEV_CONTAINER: job-search-dev
  DEV_PORT: 8081
  DEV_TTL: 3600   # 1 hour in seconds

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Build & Deploy Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/job-search-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push dev image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:dev .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:dev

      - name: Create deploy script
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cat > /tmp/deploy-dev.sh << 'SCRIPT'
          #!/bin/bash
          IMAGE=$1
          REGISTRY=$2
          REGION=$3

          echo "==> Logging in to ECR..."
          aws ecr get-login-password --region "$REGION" \
            | docker login --username AWS --password-stdin "$REGISTRY"

          echo "==> Pulling dev image..."
          docker pull "$IMAGE"

          echo "==> Stopping old dev container..."
          docker stop job-search-dev 2>/dev/null || true
          docker rm   job-search-dev 2>/dev/null || true
          pkill -f 'sleep.*job-search-dev' 2>/dev/null || true

          echo "==> Reading DB credentials from Parameter Store..."
          DB_HOST=$(aws ssm get-parameter --name /job-search/db-host --query Parameter.Value --output text)
          DB_USER=$(aws ssm get-parameter --name /job-search/db-user --query Parameter.Value --output text)
          DB_PASS=$(aws ssm get-parameter --name /job-search/db-password --with-decryption --query Parameter.Value --output text)

          echo "==> Applying schema to jobsearch_dev..."
          docker run --rm \
            -e DB_HOST="$DB_HOST" \
            -e DB_NAME=jobsearch_dev \
            -e DB_USER="$DB_USER" \
            -e DB_PASSWORD="$DB_PASS" \
            "$IMAGE" \
            python3 -c 'import sys; sys.path.insert(0,"."); from db.db import init_pool,get_conn,put_conn; init_pool(); c=get_conn(); c.cursor().execute(open("db/schema.sql").read()); c.commit(); put_conn(c); print("Schema applied to jobsearch_dev")' \
          || echo "WARNING: Schema apply failed (run one-time DB setup if this is a fresh environment)"

          echo "==> Starting dev container on port 8081..."
          docker run -d --name job-search-dev \
            -p 8081:8080 \
            -e DB_HOST="$DB_HOST" \
            -e DB_NAME=jobsearch_dev \
            -e DB_USER="$DB_USER" \
            -e DB_PASSWORD="$DB_PASS" \
            -e DASHBOARD_PASSWORD="" \
            -v /home/ec2-user/config.json:/app/config.json:ro \
            -v /home/ec2-user/resumes:/app/resumes \
            "$IMAGE"

          echo "==> Scheduling auto-kill in 1 hour..."
          nohup sh -c 'sleep 3600 && docker stop job-search-dev && docker rm job-search-dev 2>/dev/null' \
            >/dev/null 2>&1 &

          echo "==> Dev environment running on port 8081"
          SCRIPT
          chmod +x /tmp/deploy-dev.sh

      - name: Deploy dev container to EC2
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

          SSH_OPTS="-i /tmp/deploy_key.pem -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          SSH_TARGET="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          IMAGE="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:dev"

          scp $SSH_OPTS /tmp/deploy-dev.sh "$SSH_TARGET:/tmp/deploy-dev.sh"
          ssh $SSH_OPTS "$SSH_TARGET" "bash /tmp/deploy-dev.sh '$IMAGE' '$ECR_REGISTRY' '${{ env.AWS_REGION }}' && rm -f /tmp/deploy-dev.sh"

          rm -f /tmp/deploy_key.pem

      - name: Post dev URL
        run: |
          echo "## Dev Environment" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** http://${{ secrets.EC2_HOST }}:${{ env.DEV_PORT }}" >> $GITHUB_STEP_SUMMARY
          echo "Auto-kills in 1 hour. No login required." >> $GITHUB_STEP_SUMMARY
