name: Fix SSH Access

on:
  workflow_dispatch:
    inputs:
      allowed_ip:
        description: 'IP to allow SSH from (CIDR, e.g. 1.2.3.4/32)'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  fix-ssh:
    name: Diagnose & fix iptables
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/job-search-github-actions
          aws-region: us-west-2

      - name: Add port 2222 to sshd and restart
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/fix_key.pem
          chmod 600 /tmp/fix_key.pem
          SSH_OPTS="-i /tmp/fix_key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=15"
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            echo '=== Adding Port 2222 to sshd_config ==='
            grep -q '^Port 2222' /etc/ssh/sshd_config || echo 'Port 2222' | sudo tee -a /etc/ssh/sshd_config
            echo ''
            echo '=== Restarting sshd ==='
            sudo systemctl restart sshd
            echo ''
            echo '=== sshd listening sockets after restart ==='
            sudo ss -tnlp | grep sshd
          "
          rm -f /tmp/fix_key.pem
