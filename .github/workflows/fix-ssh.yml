name: Fix SSH Access

on:
  workflow_dispatch:
    inputs:
      allowed_ip:
        description: 'IP to allow SSH from (CIDR, e.g. 1.2.3.4/32)'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  fix-ssh:
    name: Diagnose & fix iptables
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/job-search-github-actions
          aws-region: us-west-2

      - name: Run iptables diagnostic and fix on EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/fix_key.pem
          chmod 600 /tmp/fix_key.pem
          SSH_OPTS="-i /tmp/fix_key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=15"
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            echo '=== iptables INPUT chain ==='
            sudo iptables -L INPUT -n --line-numbers
            echo ''
            echo '=== firewalld status ==='
            sudo systemctl is-active firewalld 2>/dev/null || echo 'not running'
            echo ''
            echo '=== sshd status ==='
            sudo systemctl is-active sshd
            echo ''
            echo '=== Allowing ${{ inputs.allowed_ip }} on port 22 ==='
            sudo iptables -I INPUT 1 -p tcp -s ${{ inputs.allowed_ip }} --dport 22 -j ACCEPT
            echo 'Done. New INPUT chain:'
            sudo iptables -L INPUT -n --line-numbers
          "
          rm -f /tmp/fix_key.pem
