name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Syntax check all Python files
        run: |
          find . -name "*.py" -not -path "./__pycache__/*" \
            -exec python3 -m py_compile {} \;

      - name: Lint with flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=__pycache__,.git \
            --ignore=E501,W503
