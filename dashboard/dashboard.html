<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ── Simple Markdown to HTML renderer ─────────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';
  let html = text
    // Escape HTML
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code style="background:#f3f4f6;padding:1px 4px;border-radius:3px;font-size:0.85em">$1</code>')
    // Headers
    .replace(/^### (.+)$/gm, '<h4 style="font-weight:700;font-size:0.95em;margin:8px 0 4px">$1</h4>')
    .replace(/^## (.+)$/gm, '<h3 style="font-weight:700;font-size:1.05em;margin:10px 0 4px">$1</h3>')
    .replace(/^# (.+)$/gm, '<h2 style="font-weight:700;font-size:1.15em;margin:12px 0 4px">$1</h2>')
    // Numbered lists
    .replace(/^\d+\.\s+(.+)$/gm, '<li style="margin-left:16px;list-style:decimal;margin-bottom:2px">$1</li>')
    // Bullet lists
    .replace(/^[-*]\s+(.+)$/gm, '<li style="margin-left:16px;list-style:disc;margin-bottom:2px">$1</li>')
    // Paragraphs (double newlines)
    .replace(/\n\n/g, '</p><p style="margin:6px 0">')
    // Single newlines (within paragraphs)
    .replace(/\n/g, '<br/>');
  return '<p style="margin:6px 0">' + html + '</p>';
}

// ── Hash-based routing ───────────────────────────────────────────────
const VALID_ROUTES = ['jobs', 'stats', 'pipeline', 'sankey', 'plans', 'profile'];
function parseHash() {
  const raw = decodeURIComponent(window.location.hash.replace(/^#\/?/, ''));
  const r = { view: 'jobs', batchDate: null, jobId: null, jobDetailId: null, planId: null };
  // Check for batch route: #/batch/<date>
  const batchMatch = raw.match(/^batch\/(.+)$/i);
  if (batchMatch) return { ...r, view: 'stats', batchDate: batchMatch[1] };
  // Check for job-detail route: #/job-detail/<id>
  const detailMatch = raw.match(/^job-detail\/(.+)$/i);
  if (detailMatch) return { ...r, jobDetailId: detailMatch[1] };
  // Check for job route: #/job/<id>
  const jobMatch = raw.match(/^job\/(.+)$/i);
  if (jobMatch) return { ...r, jobId: jobMatch[1] };
  // Check for plan route: #/plan/<id>
  const planMatch = raw.match(/^plan\/(.+)$/i);
  if (planMatch) return { ...r, view: 'plans', planId: planMatch[1] };
  // Standard route
  const v = raw.toLowerCase();
  return { ...r, view: VALID_ROUTES.includes(v) ? v : 'jobs' };
}
function useHashRoute() {
  const initial = parseHash();
  const [view, setViewState] = useState(initial.view);
  const [hashBatchDate, setHashBatchDate] = useState(initial.batchDate);
  const [hashJobId, setHashJobId] = useState(initial.jobId);
  const [hashJobDetailId, setHashJobDetailId] = useState(initial.jobDetailId);
  const [hashPlanId, setHashPlanId] = useState(initial.planId);
  const suppressHash = useRef(false);

  useEffect(() => {
    const onHash = () => {
      if (suppressHash.current) { suppressHash.current = false; return; }
      const parsed = parseHash();
      setViewState(parsed.view);
      setHashBatchDate(parsed.batchDate);
      setHashJobId(parsed.jobId);
      setHashJobDetailId(parsed.jobDetailId);
      setHashPlanId(parsed.planId);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const setView = useCallback((v) => {
    setViewState(v);
    setHashBatchDate(null);
    setHashJobId(null);
    setHashJobDetailId(null);
    setHashPlanId(null);
    suppressHash.current = true;
    window.location.hash = '#/' + v;
  }, []);

  return [view, setView, hashBatchDate, setHashBatchDate, hashJobId, setHashJobId, hashJobDetailId, setHashJobDetailId, hashPlanId, setHashPlanId];
}

const STATUSES = [
  "Not Applied", "Applied", "Online Assessment", "Recruiter Screen",
  "1st Interview", "2nd Interview", "Onsite", "Manager Screen",
  "Rejected", "Auto-Reject", "Applied, Closed, No Update",
  "Position Closed, No Application Submitted", "Verbal Offer", "Offer", "Accepted"
];
const BATCH_STATS = [];

const STATUS_COLORS = {
  "Not Applied": "bg-gray-100 text-gray-600",
  "Applied": "bg-blue-100 text-blue-700",
  "Online Assessment": "bg-sky-100 text-sky-700",
  "Recruiter Screen": "bg-teal-100 text-teal-700",
  "1st Interview": "bg-cyan-100 text-cyan-700",
  "2nd Interview": "bg-indigo-100 text-indigo-700",
  "Onsite": "bg-violet-100 text-violet-700",
  "Manager Screen": "bg-purple-100 text-purple-700",
  "Rejected": "bg-red-100 text-red-700",
  "Auto-Reject": "bg-yellow-100 text-yellow-700",
  "Applied, Closed, No Update": "bg-orange-100 text-orange-700",
  "Position Closed, No Application Submitted": "bg-gray-200 text-gray-600",
  "Verbal Offer": "bg-emerald-100 text-emerald-700",
  "Offer": "bg-green-100 text-green-700",
  "Accepted": "bg-green-200 text-green-800",
};

const TIER_COLORS = {
  "Strong Match": "tier-strong",
  "Match": "tier-match",
  "Weak Match": "tier-weak",
};

// Persistence: server API with localStorage fallback
const IS_SERVED = window.location.protocol === "http:" || window.location.protocol === "https:";
let _serverState = null;

async function fetchServerState() {
  if (!IS_SERVED) return {};
  try {
    const res = await fetch("/api/state");
    if (res.ok) return await res.json();
  } catch {}
  return {};
}

function loadJobState(id) {
  // First check server state (loaded at init), then fall back to localStorage
  if (_serverState && _serverState[id]) return _serverState[id];
  try {
    const raw = localStorage.getItem("job_" + id);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveJobState(id, state) {
  // Always save to localStorage as cache
  try { localStorage.setItem("job_" + id, JSON.stringify(state)); } catch {}
  // Save to server if available
  if (IS_SERVED) {
    fetch("/api/state", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({id, state}),
    }).catch(() => {});
  }
}

function initJobs(serverState) {
  _serverState = serverState || {};
  return JOBS_DATA.map(j => {
    const saved = loadJobState(j.id);
    return {
      ...j,
      status: saved?.status || "Not Applied",
      notes: saved?.notes || "",
      timestamps: saved?.timestamps || {},
      favorited: saved?.favorited || false,
      applicants: saved?.applicants || j.applicants || "Unknown",
      pdf_path: saved?.pdf_path || j.pdf_path || null,
      live_status: saved?.live_status || null,
      live_status_checked: saved?.live_status_checked || null,
    };
  });
}

function initJobsFromApi(apiJobs) {
  // jobs-data API returns jobs with state already merged — just normalize fields
  return apiJobs.map(j => ({
    ...j,
    status: j.status || "Not Applied",
    notes: j.notes || "",
    timestamps: j.timestamps || {},
    favorited: false,
    applicants: j.applicants || "Unknown",
    pdf_path: j.pdf_path || null,
    live_status: j.live_status || null,
    live_status_checked: j.live_status_checked || null,
  }));
}

// Metrics
function calcMetrics(jobs) {
  const byStatus = {};
  STATUSES.forEach(s => byStatus[s] = 0);
  const byTier = { "Strong Match": 0, "Match": 0, "Weak Match": 0 };
  
  jobs.forEach(j => {
    byStatus[j.status] = (byStatus[j.status] || 0) + 1;
    byTier[j.tier] = (byTier[j.tier] || 0) + 1;
  });

  const applied = jobs.filter(j => j.status !== "Not Applied");
  const transitions = {};
  const pairs = [
    ["Applied", "1st Interview"],
    ["1st Interview", "2nd Interview"],
    ["2nd Interview", "Final"],
    ["Applied", "Rejected"],
    ["Applied", "Auto-Reject"],
  ];
  pairs.forEach(([from, to]) => {
    const times = applied
      .filter(j => j.timestamps[from] && j.timestamps[to])
      .map(j => j.timestamps[to] - j.timestamps[from]);
    if (times.length > 0) {
      const avg = times.reduce((a, b) => a + b, 0) / times.length;
      transitions[from + " to " + to] = Math.round(avg / (1000 * 60 * 60 * 24) * 10) / 10;
    }
  });

  return { byStatus, byTier, total: jobs.length, applied: applied.length, transitions };
}




function ProfileView() {
  const { useState, useEffect, useCallback } = React;
  const [profile, setProfile] = useState(null);
  const [saving, setSaving] = useState(false);
  const [saveMsg, setSaveMsg] = useState('');
  const [newBullet, setNewBullet] = useState({});
  const [editingBullet, setEditingBullet] = useState(null); // {compKey, index}

  useEffect(() => {
    fetch('/api/profile').then(r => r.json()).then(data => {
      if (!data.error) setProfile(data);
    }).catch(() => {});
  }, []);

  const saveProfile = useCallback(async (updated) => {
    setSaving(true);
    setSaveMsg('');
    try {
      const res = await fetch('/api/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updated),
      });
      const data = await res.json();
      if (data.ok) {
        setSaveMsg('Saved');
        setTimeout(() => setSaveMsg(''), 2000);
      } else {
        setSaveMsg('Error: ' + data.error);
      }
    } catch (err) {
      setSaveMsg('Error: ' + err.message);
    }
    setSaving(false);
  }, []);

  const addBullet = useCallback((compKey) => {
    const text = (newBullet[compKey] || '').trim();
    if (!text || !profile) return;
    const updated = { ...profile };
    updated.experience[compKey].bullets = [...updated.experience[compKey].bullets, text];
    setProfile(updated);
    setNewBullet(prev => ({ ...prev, [compKey]: '' }));
    saveProfile(updated);
  }, [profile, newBullet, saveProfile]);

  const removeBullet = useCallback((compKey, index) => {
    if (!profile) return;
    if (!confirm('Remove this bullet?')) return;
    const updated = { ...profile };
    updated.experience[compKey].bullets = updated.experience[compKey].bullets.filter((_, i) => i !== index);
    setProfile(updated);
    saveProfile(updated);
  }, [profile, saveProfile]);

  const updateBullet = useCallback((compKey, index, text) => {
    if (!profile) return;
    const updated = { ...profile };
    updated.experience[compKey].bullets = updated.experience[compKey].bullets.map((b, i) => i === index ? text : b);
    setProfile(updated);
  }, [profile]);

  const saveBulletEdit = useCallback((compKey, index) => {
    setEditingBullet(null);
    if (profile) saveProfile(profile);
  }, [profile, saveProfile]);

  const updateCandidate = useCallback((field, value) => {
    if (!profile) return;
    const updated = { ...profile, candidate: { ...profile.candidate, [field]: value } };
    setProfile(updated);
  }, [profile]);

  const updateSkills = useCallback((field, value) => {
    if (!profile) return;
    const updated = { ...profile, skills_template: { ...profile.skills_template, [field]: value } };
    setProfile(updated);
  }, [profile]);

  if (!profile) return (
    <div className="flex items-center justify-center" style={{height: 'calc(100vh - 130px)'}}>
      <p className="text-gray-400">Loading profile...</p>
    </div>
  );

  const companies = Object.entries(profile.experience);

  return (
    <div className="p-6 overflow-auto" style={{height: 'calc(100vh - 130px)'}}>
      <div className="max-w-5xl mx-auto">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-xl font-bold text-gray-800">Profile &amp; Bullet Pool</h2>
            <p className="text-sm text-gray-500">{companies.reduce((sum, [, e]) => sum + e.bullets.length, 0)} bullets across {companies.length} companies</p>
          </div>
          <div className="flex items-center gap-3">
            {saveMsg && <span className={"text-xs font-medium " + (saveMsg.startsWith('Error') ? "text-red-500" : "text-green-600")}>{saveMsg}</span>}
            <button
              onClick={() => saveProfile(profile)}
              disabled={saving}
              className="px-4 py-2 bg-blue-600 text-white rounded text-sm font-medium hover:bg-blue-700 disabled:opacity-50"
            >
              {saving ? 'Saving...' : 'Save Changes'}
            </button>
          </div>
        </div>

        {/* Candidate Info */}
        <div className="bg-white rounded-lg border p-4 mb-4">
          <h3 className="text-sm font-semibold text-gray-700 mb-3">Candidate Info</h3>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs text-gray-400 block mb-1">Name</label>
              <input type="text" value={profile.candidate.name || ''}
                onChange={e => updateCandidate('name', e.target.value)}
                onBlur={() => saveProfile(profile)}
                className="w-full px-3 py-1.5 border rounded text-sm" />
            </div>
            <div>
              <label className="text-xs text-gray-400 block mb-1">LinkedIn URL</label>
              <input type="text" value={profile.candidate.linkedin_url || ''}
                onChange={e => updateCandidate('linkedin_url', e.target.value)}
                onBlur={() => saveProfile(profile)}
                className="w-full px-3 py-1.5 border rounded text-sm" />
            </div>
            <div className="col-span-2">
              <label className="text-xs text-gray-400 block mb-1">Skills</label>
              <input type="text" value={profile.candidate.skills || ''}
                onChange={e => updateCandidate('skills', e.target.value)}
                onBlur={() => saveProfile(profile)}
                className="w-full px-3 py-1.5 border rounded text-sm" />
            </div>
          </div>
        </div>

        {/* Skills Template */}
        <div className="bg-white rounded-lg border p-4 mb-4">
          <h3 className="text-sm font-semibold text-gray-700 mb-3">Skills Template (for generated resumes)</h3>
          <div className="grid grid-cols-1 gap-3">
            {['languages', 'frameworks', 'misc'].map(field => (
              <div key={field}>
                <label className="text-xs text-gray-400 block mb-1 capitalize">{field}</label>
                <input type="text" value={profile.skills_template[field] || ''}
                  onChange={e => updateSkills(field, e.target.value)}
                  onBlur={() => saveProfile(profile)}
                  className="w-full px-3 py-1.5 border rounded text-sm" />
              </div>
            ))}
          </div>
        </div>

        {/* Experience / Bullet Pool */}
        {companies.map(([compKey, comp]) => (
          <div key={compKey} className="bg-white rounded-lg border p-4 mb-4">
            <div className="flex items-center justify-between mb-3">
              <div>
                <h3 className="text-sm font-semibold text-gray-700">{comp.display_name}</h3>
                <p className="text-xs text-gray-400">{comp.context} &bull; Limit: {comp.bullet_limit} per resume &bull; {comp.bullets.length} bullets in pool</p>
              </div>
            </div>

            <div className="space-y-2">
              {comp.bullets.map((bullet, i) => (
                <div key={i} className="flex items-start gap-2 group">
                  <span className="text-xs text-gray-300 mt-1.5 w-5 flex-shrink-0 text-right">{i + 1}.</span>
                  {editingBullet && editingBullet.compKey === compKey && editingBullet.index === i ? (
                    <textarea
                      value={bullet}
                      onChange={e => updateBullet(compKey, i, e.target.value)}
                      onBlur={() => saveBulletEdit(compKey, i)}
                      onKeyDown={e => { if (e.key === 'Escape') setEditingBullet(null); }}
                      className="flex-1 px-2 py-1 border border-blue-300 rounded text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-400"
                      rows={3}
                      autoFocus
                    />
                  ) : (
                    <p className="flex-1 text-sm text-gray-700 leading-relaxed cursor-pointer hover:bg-gray-50 px-2 py-1 rounded"
                      onClick={() => setEditingBullet({ compKey, index: i })}
                      title="Click to edit">
                      {bullet}
                    </p>
                  )}
                  <button
                    onClick={() => removeBullet(compKey, i)}
                    className="text-gray-200 hover:text-red-500 text-xs px-1 mt-1 opacity-0 group-hover:opacity-100 transition-opacity"
                    title="Remove bullet"
                  >&#10005;</button>
                </div>
              ))}
            </div>

            {/* Add new bullet */}
            <div className="mt-3 flex gap-2">
              <input
                type="text"
                placeholder={"Add a new bullet for " + comp.display_name + "..."}
                value={newBullet[compKey] || ''}
                onChange={e => setNewBullet(prev => ({ ...prev, [compKey]: e.target.value }))}
                onKeyDown={e => { if (e.key === 'Enter') addBullet(compKey); }}
                className="flex-1 px-3 py-1.5 border rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
              />
              <button
                onClick={() => addBullet(compKey)}
                disabled={!(newBullet[compKey] || '').trim()}
                className="px-3 py-1.5 bg-blue-600 text-white rounded text-sm font-medium hover:bg-blue-700 disabled:opacity-50"
              >+ Add</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}


function PlansView({ jobs, planDetailId }) {
  const { useState, useEffect, useCallback, useMemo } = React;
  const [plans, setPlans] = useState([]);
  const [selectedPlan, setSelectedPlan] = useState(null);
  const [showCreate, setShowCreate] = useState(false);
  const [newDate, setNewDate] = useState(new Date().toISOString().slice(0, 10));
  const [newTitle, setNewTitle] = useState('');
  const [searchTerm, setSearchTerm] = useState('');
  const [addingJobs, setAddingJobs] = useState(false);

  // Load plans from server
  useEffect(() => {
    fetch('/api/plans').then(r => r.json()).then(data => {
      if (Array.isArray(data)) {
        setPlans(data);
        // Auto-select plan from URL route
        if (planDetailId) {
          const match = data.find(p => p.id === planDetailId);
          if (match) setSelectedPlan(match);
        }
      }
    }).catch(() => {});
  }, []);

  // React to planDetailId changes (e.g. browser back/forward)
  useEffect(() => {
    if (planDetailId && plans.length) {
      const match = plans.find(p => p.id === planDetailId);
      if (match) setSelectedPlan(match);
    }
  }, [planDetailId, plans]);

  const savePlans = useCallback((updated) => {
    setPlans(updated);
    fetch('/api/plans', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(updated),
    }).catch(() => {});
    // Sync App-level plans state so _getPlans stays current
    if (window._syncAppPlans) window._syncAppPlans(updated);
  }, []);

  // Sync local plans state with App-level plans (kept in sync via _getPlans)
  useEffect(() => {
    const appPlans = window._getPlans ? window._getPlans() : [];
    if (appPlans.length && !plans.length) setPlans(appPlans);
  }, []);

  const createPlan = useCallback(() => {
    const plan = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      date: newDate,
      title: newTitle || 'Application Plan for ' + newDate,
      jobs: [],
      created: Date.now(),
    };
    const updated = [plan, ...plans];
    savePlans(updated);
    setSelectedPlan(plan);
    setShowCreate(false);
    setNewTitle('');
    window.location.hash = '#/plan/' + plan.id;
  }, [newDate, newTitle, plans, savePlans]);

  const deletePlan = useCallback((planId) => {
    const updated = plans.filter(p => p.id !== planId);
    savePlans(updated);
    if (selectedPlan?.id === planId) { setSelectedPlan(null); window.location.hash = '#/plans'; }
  }, [plans, selectedPlan, savePlans]);

  const addJobToPlan = useCallback((job) => {
    if (!selectedPlan) return;
    if (selectedPlan.jobs.some(j => j.id === job.id)) return;
    const updatedPlan = {
      ...selectedPlan,
      jobs: [...selectedPlan.jobs, { id: job.id, company: job.company, title: job.title, notes: '' }],
    };
    const updated = plans.map(p => p.id === updatedPlan.id ? updatedPlan : p);
    savePlans(updated);
    setSelectedPlan(updatedPlan);
  }, [selectedPlan, plans, savePlans]);

  const removeJobFromPlan = useCallback((jobId) => {
    if (!selectedPlan) return;
    const updatedPlan = {
      ...selectedPlan,
      jobs: selectedPlan.jobs.filter(j => j.id !== jobId),
    };
    const updated = plans.map(p => p.id === updatedPlan.id ? updatedPlan : p);
    savePlans(updated);
    setSelectedPlan(updatedPlan);
  }, [selectedPlan, plans, savePlans]);

  const updateJobNotes = useCallback((jobId, notes) => {
    if (!selectedPlan) return;
    const updatedPlan = {
      ...selectedPlan,
      jobs: selectedPlan.jobs.map(j => j.id === jobId ? { ...j, notes } : j),
    };
    const updated = plans.map(p => p.id === updatedPlan.id ? updatedPlan : p);
    savePlans(updated);
    setSelectedPlan(updatedPlan);
  }, [selectedPlan, plans, savePlans]);

  const downloadPdf = useCallback((planId) => {
    window.open('/api/plan-pdf/' + planId, '_blank');
  }, []);

  // Search available jobs to add
  const searchResults = useMemo(() => {
    if (!searchTerm || searchTerm.length < 2) return [];
    const term = searchTerm.toLowerCase();
    const planJobIds = new Set((selectedPlan?.jobs || []).map(j => j.id));
    return jobs
      .filter(j => !planJobIds.has(j.id) &&
        (j.company.toLowerCase().includes(term) || j.title.toLowerCase().includes(term)))
      .sort((a, b) => b.score - a.score)
      .slice(0, 20);
  }, [searchTerm, jobs, selectedPlan]);

  const TIER_COLORS = {
    'Strong Match': { bg: 'bg-green-100', text: 'text-green-700', border: 'border-green-300' },
    'Match': { bg: 'bg-blue-100', text: 'text-blue-700', border: 'border-blue-300' },
    'Weak Match': { bg: 'bg-yellow-100', text: 'text-yellow-700', border: 'border-yellow-300' },
  };

  const getJob = (id) => jobs.find(j => j.id === id) || {};

  return (
    <div className="flex" style={{height: 'calc(100vh - 130px)'}}>
      {/* Left: Plan list */}

          </div>
          {showCreate && (
            <div className="bg-gray-50 rounded-lg p-3 space-y-2 mb-2 border">
              <input type="date" value={newDate}
                onChange={e => setNewDate(e.target.value)}
                className="w-full px-2 py-1.5 border rounded text-sm" />
              <input type="text" placeholder="Plan title (optional)"
                value={newTitle} onChange={e => setNewTitle(e.target.value)}
                className="w-full px-2 py-1.5 border rounded text-sm" />
              <button onClick={createPlan}
                className="w-full py-1.5 bg-blue-600 text-white rounded text-xs font-medium hover:bg-blue-700">
                Create Plan
              </button>
            </div>
          )}
        </div>
        <div className="flex-1 overflow-y-auto">
          {plans.length === 0 && (
            <div className="p-6 text-center text-sm text-gray-400">
              No plans yet. Click "+ New" to create one.
            </div>
          )}
          {plans.map(plan => (
            <div key={plan.id}
              onClick={() => { setSelectedPlan(plan); setAddingJobs(false); setSearchTerm(''); window.location.hash = '#/plan/' + plan.id; }}
              className={"p-3 border-b cursor-pointer hover:bg-blue-50 transition-colors " +

                  <div className="text-xs text-gray-400 mt-0.5">{plan.jobs.length} job{plan.jobs.length !== 1 ? 's' : ''}</div>
                </div>
                <button onClick={(e) => { e.stopPropagation(); deletePlan(plan.id); }}
                  className="text-gray-300 hover:text-red-500 text-xs px-1" title="Delete plan">
                  &#10005;
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Right: Plan detail */}
      <div className="flex-1 overflow-y-auto bg-gray-50">
        {!selectedPlan ? (
          <div className="flex items-center justify-center h-full text-gray-400">
            <div className="text-center">
              <div className="text-4xl mb-3">&#128203;</div>
              <p className="text-lg font-medium">Select or create a plan</p>

              </div>

                <button onClick={() => { setAddingJobs(!addingJobs); setSearchTerm(''); }}
                  className={"px-3 py-1.5 rounded text-xs font-medium border " +
                    (addingJobs ? 'bg-blue-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-50')}>
                  {addingJobs ? 'Done Adding' : '+ Add Jobs'}

                {selectedPlan.jobs.length > 0 && (

                {searchResults.length > 0 && (

function PipelineView({ jobs, changeStatus }) {
  const { useState, useMemo, useCallback } = React;
  const [draggedJob, setDraggedJob] = useState(null);
  const [hoveredStage, setHoveredStage] = useState(null);
  const [logoErrors, setLogoErrors] = useState({});

  // Only show jobs that have been applied to (or further), plus Not Applied with favorites
  const PIPELINE_STAGES = [
    { id: "Applied", color: "#3b82f6", bg: "#eff6ff", border: "#bfdbfe" },
    { id: "Online Assessment", color: "#0284c7", bg: "#f0f9ff", border: "#bae6fd" },
    { id: "Recruiter Screen", color: "#0d9488", bg: "#f0fdfa", border: "#99f6e4" },
    { id: "1st Interview", color: "#0891b2", bg: "#ecfeff", border: "#a5f3fc" },
    { id: "2nd Interview", color: "#6366f1", bg: "#eef2ff", border: "#c7d2fe" },
    { id: "Onsite", color: "#8b5cf6", bg: "#f5f3ff", border: "#ddd6fe" },
    { id: "Manager Screen", color: "#7c3aed", bg: "#f5f3ff", border: "#ddd6fe" },
    { id: "Verbal Offer", color: "#059669", bg: "#ecfdf5", border: "#a7f3d0" },
    { id: "Offer", color: "#16a34a", bg: "#f0fdf4", border: "#bbf7d0" },
    { id: "Accepted", color: "#15803d", bg: "#f0fdf4", border: "#86efac" },
    { id: "Rejected", color: "#dc2626", bg: "#fef2f2", border: "#fecaca" },
    { id: "Auto-Reject", color: "#d97706", bg: "#fffbeb", border: "#fde68a" },
  ];

  const stageMap = useMemo(() => {
    const map = {};
    PIPELINE_STAGES.forEach(s => { map[s.id] = []; });
    jobs.forEach(j => {
      if (j.status !== "Not Applied" && map[j.status]) {
        map[j.status].push(j);
      }
    });
    // Sort each column by score descending
    Object.values(map).forEach(arr => arr.sort((a, b) => b.score - a.score));
    return map;
  }, [jobs]);

  const activeCount = useMemo(() =>
    jobs.filter(j => j.status !== "Not Applied").length
  , [jobs]);

  const getLogoUrl = useCallback((company) => {
    if (!company || logoErrors[company]) return null;
    const domain = company.toLowerCase()
      .replace(/[^a-z0-9\s]/g, '')
      .replace(/\s+/g, '')
      + '.com';
    return `https://logo.clearbit.com/${domain}?size=40`;
  }, [logoErrors]);

  const handleLogError = useCallback((company) => {
    setLogoErrors(prev => ({ ...prev, [company]: true }));
  }, []);

  const onDragStart = useCallback((e, job) => {
    setDraggedJob(job);
    e.dataTransfer.effectAllowed = 'move';
  }, []);

  const onDragOver = useCallback((e, stageId) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    setHoveredStage(stageId);
  }, []);

  const onDragLeave = useCallback(() => {
    setHoveredStage(null);
  }, []);

  const onDrop = useCallback((e, stageId) => {
    e.preventDefault();
    setHoveredStage(null);
    if (draggedJob && draggedJob.status !== stageId) {
      changeStatus(draggedJob.id, stageId);
    }
    setDraggedJob(null);
  }, [draggedJob, changeStatus]);

  const tierDot = (tier) => {
    if (tier === 'Strong Match') return { bg: '#16a34a', label: 'S' };
    if (tier === 'Match') return { bg: '#3b82f6', label: 'M' };
    return { bg: '#d97706', label: 'W' };
  };

  return (
    <div className="p-4 overflow-auto" style={{height: 'calc(100vh - 130px)'}}>
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="text-lg font-bold text-gray-800">Application Pipeline</h2>
          <p className="text-sm text-gray-500">{activeCount} active applications &middot; Drag cards between stages</p>
        </div>
      </div>

      <div className="flex gap-3 overflow-x-auto pb-4" style={{minHeight: 'calc(100vh - 220px)'}}>
        {PIPELINE_STAGES.map(stage => {
          const stageJobs = stageMap[stage.id] || [];
          const isHovered = hoveredStage === stage.id;
          return (
            <div
              key={stage.id}
              className="flex-shrink-0 rounded-lg flex flex-col"
              style={{
                width: '220px',
                backgroundColor: isHovered ? stage.bg : '#f8fafc',
                border: `2px ${isHovered ? 'dashed' : 'solid'} ${isHovered ? stage.color : '#e2e8f0'}`,
                transition: 'all 0.15s ease',
              }}
              onDragOver={(e) => onDragOver(e, stage.id)}
              onDragLeave={onDragLeave}
              onDrop={(e) => onDrop(e, stage.id)}
            >
              {/* Column header */}
              <div className="px-3 py-2 border-b flex items-center justify-between flex-shrink-0"
                style={{ borderColor: stage.border }}>
                <div className="flex items-center gap-2">
                  <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: stage.color }} />
                  <span className="text-xs font-bold" style={{ color: stage.color }}>{stage.id}</span>
                </div>
                <span className="text-xs font-bold rounded-full px-2 py-0.5"
                  style={{ backgroundColor: stage.bg, color: stage.color }}>
                  {stageJobs.length}
                </span>
              </div>

              {/* Cards */}
              <div className="p-2 flex-1 overflow-y-auto space-y-2"
                style={{ maxHeight: 'calc(100vh - 300px)' }}>
                {stageJobs.length === 0 && (
                  <div className="text-center py-8 text-xs text-gray-400">
                    Drop jobs here
                  </div>
                )}
                {stageJobs.map(job => {
                  const td = tierDot(job.tier);
                  const logoUrl = getLogoUrl(job.company);
                  return (
                    <div
                      key={job.id}
                      draggable
                      onDragStart={(e) => onDragStart(e, job)}
                      onClick={() => { if (!draggedJob) window._showJobDetail && window._showJobDetail(job.id); }}
                      className="bg-white rounded-lg border border-gray-200 p-2.5 cursor-grab active:cursor-grabbing hover:shadow-md transition-shadow"
                      style={{ opacity: draggedJob?.id === job.id ? 0.4 : 1 }}
                    >
                      <div className="flex items-start gap-2 mb-1.5">
                        {logoUrl ? (
                          <img
                            src={logoUrl}
                            alt=""
                            className="w-7 h-7 rounded flex-shrink-0 bg-gray-50 object-contain"
                            style={{ border: '1px solid #e5e7eb' }}
                            onError={() => handleLogError(job.company)}
                          />
                        ) : (
                          <div className="w-7 h-7 rounded flex-shrink-0 bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-400"
                            style={{ border: '1px solid #e5e7eb' }}>
                            {(job.company || '?')[0]}
                          </div>
                        )}
                        <div className="min-w-0 flex-1">
                          <div className="text-xs font-semibold text-gray-800 truncate" title={job.company}>{job.company}</div>
                          <div className="text-xs text-gray-500 truncate" title={job.title}>{job.title}</div>
                        </div>
                      </div>

                      <div className="flex items-center justify-between mt-1">
                        <div className="flex items-center gap-1.5">
                          <span className="inline-flex items-center justify-center w-4 h-4 rounded-full text-white font-bold"
                            style={{ backgroundColor: td.bg, fontSize: '8px' }}>
                            {td.label}
                          </span>
                          <span className="text-xs text-gray-400">Score: {job.score}</span>
                        </div>
                        {job.salary && job.salary !== 'N/A' && (
                          <span className="text-xs text-green-600 font-medium truncate ml-1" style={{maxWidth: '90px'}} title={job.salary}>
                            {job.salary}
                          </span>
                        )}
                      </div>

                      {job.location && (
                        <div className="text-xs text-gray-400 mt-1 truncate" title={job.location}>
                          {job.location}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BatchPdfDropZone({ job }) {
  const [dragging, setDragging] = useState(false);
  const [uploading, setUploading] = useState(false);

  const handleDrop = (e) => {
    e.preventDefault();
    e.stopPropagation();
    setDragging(false);
    const file = e.dataTransfer.files[0];
    if (!file || !file.name.toLowerCase().endsWith('.pdf')) return;
    setUploading(true);
    if (window._uploadPdf) {
      window._uploadPdf(job, file).then(() => setUploading(false)).catch(() => setUploading(false));
    }
  };

  const handleFileInput = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    if (window._uploadPdf) {
      window._uploadPdf(job, file).then(() => setUploading(false)).catch(() => setUploading(false));
    }
    e.target.value = "";
  };

  return (
    <div className="mt-2 border-t pt-2"
      onDragOver={e => { e.preventDefault(); e.stopPropagation(); setDragging(true); }}
      onDragLeave={e => { e.preventDefault(); e.stopPropagation(); setDragging(false); }}
      onDrop={handleDrop}
      onClick={e => e.stopPropagation()}>
      <div className={'rounded border-2 border-dashed px-3 py-2 text-center text-xs transition-colors ' +
        (dragging ? 'border-blue-400 bg-blue-50 text-blue-600' :
         uploading ? 'border-green-300 bg-green-50 text-green-600' :
         'border-gray-200 text-gray-400 hover:border-gray-300')}>
        {uploading ? 'Uploading...' : (
          <>
            {job.pdf_path ? 'Drop PDF to replace' : 'Drop PDF resume here'}
            <label className="ml-2 text-blue-500 hover:text-blue-700 cursor-pointer underline">
              or browse
              <input type="file" accept=".pdf" className="hidden" onChange={handleFileInput} />
            </label>
          </>
        )}
      </div>
    </div>
  );
}

// ── Sankey Diagram ──────────────────────────────────────────────────
const SANKEY_STAGES = [
  "Applied", "Online Assessment", "Recruiter Screen",
  "1st Interview", "2nd Interview", "Onsite", "Manager Screen",
  "Verbal Offer", "Offer", "Accepted"
];
const SANKEY_STAGE_INDEX = {};
SANKEY_STAGES.forEach((s, i) => { SANKEY_STAGE_INDEX[s] = i; });

const SANKEY_NODE_COLORS = {
  "Applied": "#3b82f6",
  "Online Assessment": "#0284c7",
  "Recruiter Screen": "#0d9488",
  "1st Interview": "#0891b2",
  "2nd Interview": "#6366f1",
  "Onsite": "#8b5cf6",
  "Manager Screen": "#7c3aed",
  "Verbal Offer": "#059669",
  "Offer": "#16a34a",
  "Accepted": "#15803d",
  "Rejected": "#dc2626",
};

function buildSankeyData(jobs) {
  const EXCLUDED_SANKEY = new Set(["Not Applied", "Auto-Reject", "Applied, Closed, No Update", "Position Closed, No Application Submitted"]);
  const pipelineJobs = jobs.filter(j =>
    !EXCLUDED_SANKEY.has(j.status) && (SANKEY_STAGE_INDEX[j.status] !== undefined || j.status === "Rejected")
  );

  if (pipelineJobs.length === 0) return { nodes: [], links: [], jobsByNode: {}, jobsByLink: {} };

  // Determine the highest stage each job reached
  function getHighestStage(job) {
    if (job.status === "Rejected") {
      // Check timestamps to find furthest stage reached
      for (let i = SANKEY_STAGES.length - 1; i >= 0; i--) {
        if (job.timestamps && job.timestamps[SANKEY_STAGES[i]]) return i;
      }
      return 0; // default to Applied
    }
    return SANKEY_STAGE_INDEX[job.status] ?? 0;
  }

  // Track link values and associated jobs
  const linkMap = {}; // "source->target" => { value, jobs }
  const nodeSet = new Set();
  const jobsByNode = {}; // nodeId => [jobs]

  pipelineJobs.forEach(job => {
    const highest = getHighestStage(job);
    const isRejected = job.status === "Rejected";

    // Job flows through Applied up to its highest stage
    for (let i = 0; i <= highest; i++) {
      const stage = SANKEY_STAGES[i];
      nodeSet.add(stage);
      if (!jobsByNode[stage]) jobsByNode[stage] = [];
      jobsByNode[stage].push(job);

      if (i > 0) {
        const key = SANKEY_STAGES[i - 1] + "->" + stage;
        if (!linkMap[key]) linkMap[key] = { value: 0, jobs: [] };
        linkMap[key].value++;
        linkMap[key].jobs.push(job);
      }
    }

    // If rejected, add a link from highest stage to Rejected
    if (isRejected) {
      nodeSet.add("Rejected");
      if (!jobsByNode["Rejected"]) jobsByNode["Rejected"] = [];
      jobsByNode["Rejected"].push(job);
      const fromStage = SANKEY_STAGES[highest];
      const key = fromStage + "->Rejected";
      if (!linkMap[key]) linkMap[key] = { value: 0, jobs: [] };
      linkMap[key].value++;
      linkMap[key].jobs.push(job);
    }
  });

  // Build nodes array - order matters for layout
  const orderedNodes = [...SANKEY_STAGES, "Rejected"].filter(s => nodeSet.has(s));
  const nodes = orderedNodes.map(s => ({
    id: s,
    label: s,
    color: SANKEY_NODE_COLORS[s],
    count: (jobsByNode[s] || []).length,
  }));

  const links = Object.entries(linkMap).map(([key, data]) => {
    const [source, target] = key.split("->");
    return { source, target, value: data.value, jobs: data.jobs };
  });

  return { nodes, links, jobsByNode, linkMap };
}

function SankeyView({ jobs }) {
  const { useState, useEffect, useMemo, useRef, useCallback } = React;
  const svgRef = useRef(null);
  const containerRef = useRef(null);
  const [dimensions, setDimensions] = useState({ width: 900, height: 500 });
  const [tooltip, setTooltip] = useState(null);
  const [selectedDetail, setSelectedDetail] = useState(null);
  const [detailSearch, setDetailSearch] = useState("");

  const sankeyData = useMemo(() => buildSankeyData(jobs), [jobs]);

  // Responsive sizing
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const ro = new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect;
      setDimensions({ width: Math.max(600, width), height: Math.max(350, height) });
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  // D3 rendering
  useEffect(() => {
    if (!svgRef.current || sankeyData.nodes.length === 0) return;

    const { width, height } = dimensions;
    const margin = { top: 30, right: 160, bottom: 30, left: 30 };

    const svg = d3.select(svgRef.current);
    svg.selectAll("*").remove();
    svg.attr("width", width).attr("height", height);

    const g = svg.append("g");

    // Deep-clone data since d3-sankey mutates in place
    const clonedNodes = sankeyData.nodes.map(n => ({ ...n }));
    const clonedLinks = sankeyData.links.map(l => ({ ...l, source: l.source, target: l.target }));

    const sankeyLayout = d3.sankey()
      .nodeId(d => d.id)
      .nodeAlign(d3.sankeyLeft)
      .nodeWidth(28)
      .nodePadding(24)
      .extent([[margin.left, margin.top], [width - margin.right, height - margin.bottom]]);

    let layout;
    try {
      layout = sankeyLayout({ nodes: clonedNodes, links: clonedLinks });
    } catch (e) {
      console.error("Sankey layout error:", e);
      return;
    }

    const { nodes, links } = layout;

    // Links
    const linkGroup = g.append("g").attr("fill", "none");
    const linkPaths = linkGroup.selectAll("path")
      .data(links)
      .join("path")
      .attr("d", d3.sankeyLinkHorizontal())
      .attr("stroke", d => d.source.color)
      .attr("stroke-width", d => Math.max(2, d.width))
      .attr("opacity", 0.35)
      .style("cursor", "pointer")
      .style("transition", "opacity 0.2s");

    // Link hover
    linkPaths
      .on("mouseenter", function(event, d) {
        linkPaths.attr("opacity", l => l === d ? 0.6 : 0.08);
        const total = sankeyData.jobsByNode["Applied"] ? sankeyData.jobsByNode["Applied"].length : d.value;
        const pct = total > 0 ? Math.round(d.value / total * 100) : 0;
        setTooltip({
          x: event.offsetX,
          y: event.offsetY,
          text: d.source.label + " \u2192 " + d.target.label + ": " + d.value + " job" + (d.value !== 1 ? "s" : "") + " (" + pct + "%)"
        });
      })
      .on("mousemove", function(event) {
        setTooltip(prev => prev ? { ...prev, x: event.offsetX, y: event.offsetY } : null);
      })
      .on("mouseleave", function() {
        linkPaths.attr("opacity", 0.35);
        setTooltip(null);
      })
      .on("click", function(event, d) {
        const srcLink = sankeyData.links.find(l => l.source === d.source.id && l.target === d.target.id);
        setSelectedDetail({
          title: d.source.label + " \u2192 " + d.target.label,
          jobs: srcLink ? srcLink.jobs : d.jobs || [],
        });
        setDetailSearch("");
      });

    // Nodes — rendered after links so they sit on top in SVG z-order
    const nodeGroup = g.append("g");
    const nodeRects = nodeGroup.selectAll("rect")
      .data(nodes)
      .join("rect")
      .attr("x", d => d.x0)
      .attr("y", d => d.y0)
      .attr("width", d => d.x1 - d.x0)
      .attr("height", d => Math.max(4, d.y1 - d.y0))
      .attr("fill", d => d.color)
      .attr("rx", 3)
      .style("cursor", "pointer");

    // Raise entire node group above links to ensure node clicks take priority
    nodeGroup.raise();

    // Node hover & click
    nodeRects
      .on("mouseenter", function(event, d) {
        linkPaths.attr("opacity", l =>
          l.source === d || l.target === d ? 0.5 : 0.06
        );
        nodeRects.attr("opacity", n =>
          n === d || links.some(l => (l.source === d || l.target === d) && (l.source === n || l.target === n)) ? 1 : 0.3
        );
        const total = sankeyData.jobsByNode["Applied"] ? sankeyData.jobsByNode["Applied"].length : d.count;
        const pct = total > 0 ? Math.round(d.count / total * 100) : 0;
        setTooltip({
          x: event.offsetX,
          y: event.offsetY,
          text: d.label + ": " + d.count + " job" + (d.count !== 1 ? "s" : "") + " (" + pct + "%)"
        });
      })
      .on("mousemove", function(event) {
        setTooltip(prev => prev ? { ...prev, x: event.offsetX, y: event.offsetY } : null);
      })
      .on("mouseleave", function() {
        linkPaths.attr("opacity", 0.35);
        nodeRects.attr("opacity", 1);
        setTooltip(null);
      })
      .on("click", function(event, d) {
        setSelectedDetail({
          title: d.label,
          jobs: sankeyData.jobsByNode[d.id] || [],
        });
        setDetailSearch("");
      });

    // Node labels (also clickable)
    nodeGroup.selectAll("text")
      .data(nodes)
      .join("text")
      .attr("x", d => d.x1 + 8)
      .attr("y", d => (d.y0 + d.y1) / 2)
      .attr("dy", "0.35em")
      .attr("font-size", "13px")
      .attr("font-weight", "600")
      .attr("font-family", "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif")
      .attr("fill", "#374151")
      .text(d => d.label + " (" + d.count + ")")
      .style("cursor", "pointer")
      .on("click", function(event, d) {
        event.stopPropagation();
        setSelectedDetail({
          title: d.label,
          jobs: sankeyData.jobsByNode[d.id] || [],
        });
        setDetailSearch("");
      });

  }, [sankeyData, dimensions]);

  const pipelineJobs = useMemo(() =>
    jobs.filter(j => j.status !== "Not Applied" && j.status !== "Auto-Reject"),
    [jobs]
  );

  // Filtered detail jobs
  const filteredDetailJobs = useMemo(() => {
    if (!selectedDetail) return [];
    let list = selectedDetail.jobs;
    if (detailSearch) {
      const q = detailSearch.toLowerCase();
      list = list.filter(j => j.company.toLowerCase().includes(q) || j.title.toLowerCase().includes(q));
    }
    return list.sort((a, b) => b.score - a.score);
  }, [selectedDetail, detailSearch]);

  if (pipelineJobs.length === 0) {
    return React.createElement("div", { className: "flex flex-col items-center justify-center h-full text-gray-400 py-20" },
      React.createElement("div", { className: "text-5xl mb-4" }, "\u{1F4CA}"),
      React.createElement("p", { className: "text-lg" }, "No jobs in the interview pipeline yet."),
      React.createElement("p", { className: "text-sm mt-1" }, "Apply to jobs and track their progress to see the Sankey flow.")
    );
  }

  return React.createElement("div", { className: "flex flex-col", style: { height: "calc(100vh - 120px)" } },
    // Header
    React.createElement("div", { className: "bg-white border-b px-6 py-3 flex items-center justify-between" },
      React.createElement("div", null,
        React.createElement("h2", { className: "text-lg font-bold text-gray-800" }, "Interview Pipeline Flow"),
        React.createElement("p", { className: "text-xs text-gray-500" },
          pipelineJobs.length + " job" + (pipelineJobs.length !== 1 ? "s" : "") + " in pipeline"
        )
      ),
      React.createElement("div", { className: "flex gap-2 flex-wrap" },
        SANKEY_STAGES.concat(["Rejected"]).filter(s => sankeyData.jobsByNode[s] && sankeyData.jobsByNode[s].length > 0).map(s =>
          React.createElement("span", {
            key: s,
            className: "px-2 py-0.5 rounded text-xs font-medium text-white",
            style: { backgroundColor: SANKEY_NODE_COLORS[s] }
          }, s + ": " + sankeyData.jobsByNode[s].length)
        )
      )
    ),
    // Chart area
    React.createElement("div", { className: "flex flex-1 overflow-hidden" },
      React.createElement("div", {
        ref: containerRef,
        className: "flex-1 relative overflow-auto bg-gray-50 p-4",
      },
        React.createElement("svg", { ref: svgRef, className: "w-full h-full", style: { minWidth: 600, minHeight: 350 } }),
        // Tooltip
        tooltip && React.createElement("div", {
          className: "absolute bg-gray-900 text-white text-xs rounded-lg px-3 py-2 shadow-lg pointer-events-none z-50",
          style: { left: tooltip.x + 14, top: tooltip.y - 14 }
        }, tooltip.text)
      ),
      // Detail panel
      selectedDetail && React.createElement("div", {
        className: "w-80 bg-white border-l shadow-lg overflow-y-auto flex-shrink-0",
        style: { animation: "slideInRight 0.2s ease-out" }
      },
        React.createElement("div", { className: "sticky top-0 bg-white border-b p-4 z-10" },
          React.createElement("div", { className: "flex justify-between items-center mb-2" },
            React.createElement("h3", { className: "font-bold text-gray-800 text-sm" }, selectedDetail.title),
            React.createElement("button", {
              onClick: () => setSelectedDetail(null),
              className: "text-gray-400 hover:text-gray-600 text-lg leading-none"
            }, "\u00D7")
          ),
          React.createElement("p", { className: "text-xs text-gray-500 mb-2" },
            filteredDetailJobs.length + " of " + selectedDetail.jobs.length + " jobs"
          ),
          selectedDetail.jobs.length > 5 && React.createElement("input", {
            type: "text",
            placeholder: "Search jobs...",
            value: detailSearch,
            onChange: e => setDetailSearch(e.target.value),
            className: "w-full px-2 py-1 border rounded text-xs"
          })
        ),
        React.createElement("div", { className: "p-4 space-y-2" },
          filteredDetailJobs.slice(0, 100).map(job =>
            React.createElement("div", {
              key: job.id,
              onClick: () => window._showJobDetail && window._showJobDetail(job.id),
              className: "p-2 rounded border hover:bg-blue-50 cursor-pointer transition-colors"
            },
              React.createElement("div", { className: "font-medium text-sm text-gray-800 truncate" }, job.company),
              React.createElement("div", { className: "text-xs text-gray-500 truncate" }, job.title),
              React.createElement("div", { className: "flex gap-2 mt-1 items-center" },
                React.createElement("span", {
                  className: "px-1.5 py-0.5 rounded text-xs text-white",
                  style: { backgroundColor: SANKEY_NODE_COLORS[job.status] || "#9ca3af" }
                }, job.status),
                React.createElement("span", { className: "text-xs text-gray-400" }, "Score: " + job.score)
              )
            )
          ),
          filteredDetailJobs.length > 100 && React.createElement("p", { className: "text-xs text-gray-400 text-center py-2" },
            "Showing 100 of " + filteredDetailJobs.length + ". Use search to filter."
          )
        )
      )
    )
  );
}

    setDescCache(prev => ({ ...prev, [jobId]: { loading: true } }));
    fetch('/api/job-description/' + jobId)
      .then(r => r.json())
      .then(data => setDescCache(prev => ({ ...prev, [jobId]: { html: data.formatted || '', text: data.description || 'No description available.' } })))
      .catch(() => setDescCache(prev => ({ ...prev, [jobId]: { error: true } })));
  };

  const fetchCompanyInfo = (companyName) => {
    const key = (companyName || '').trim().toLowerCase();
    if (companyCache[key] !== undefined) return;
    setCompanyCache(prev => ({ ...prev, [key]: { loading: true } }));
    fetch('/api/company-info/' + encodeURIComponent(companyName))
      .then(r => r.json())

      .catch(() => setCompanyCache(prev => ({ ...prev, [key]: { error: true } })));
  };

    const byDate = {};
    jobs.forEach(j => {

      byDate[d].total++;
      if (j.tier === 'Strong Match') byDate[d].strong++;
      else if (j.tier === 'Match') byDate[d].match++;
      else byDate[d].weak++;
    });
    return Object.values(byDate).sort((a, b) => {
      // "AI Import" always first
      if (a.date === 'AI Import') return -1;

function AIResumeAssistant({ job }) {
  const { useState, useCallback, useEffect, useRef } = React;
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [thinking, setThinking] = useState(false);
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, thinking]);

  // Reset messages when job changes
  useEffect(() => { setMessages([]); }, [job && job.id]);

  const sendMessage = useCallback(async (text, opts = {}) => {
    if (!text.trim() || thinking) return;
    const userMsg = { role: 'user', content: text.trim() };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput('');
    setThinking(true);
    try {
      const res = await fetch('/api/ai-review', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: userMsg.content,
          job_id: job ? job.id : null,
          history: messages,
          include_pdf: opts.include_pdf || false,
        }),
      });
      const data = await res.json();
      if (data.error) {
        setMessages(prev => [...prev, { role: 'assistant', content: 'Error: ' + data.error }]);
      } else {
        setMessages(prev => [...prev, { role: 'assistant', content: data.response }]);
      }
    } catch (err) {
      setMessages(prev => [...prev, { role: 'assistant', content: 'Error: Could not connect to AI service.' }]);
    }
    setThinking(false);
  }, [messages, job, thinking]);

  const quickPrompts = [
    { label: 'Analyze Fit', prompt: 'Analyze this job posting against my resume. Rate the fit from 1-10. List which requirements my experience covers well, and identify any gaps. Be specific \u2014 reference my actual bullets.' },
    { label: 'Tailor Bullets', prompt: 'Review my tailored resume for this job. Suggest specific bullet rewordings, reorderings, or substitutions from my full bullet pool that would improve the keyword match. Show the before and after for each suggestion.' },
    { label: 'Interview Prep', prompt: 'Based on this job description and my resume, generate 5 technical and 5 behavioral interview questions I should prepare for. For each, suggest a strong answer that references my specific experience.' },
    { label: 'Cover Letter', prompt: 'Draft a concise 2-paragraph cover letter for this position. Reference my most relevant experience from the resume. Keep it professional and specific to this role \u2014 no generic filler. Two paragraphs maximum.' },
  ];

  return (
    <div className="bg-white rounded-lg border p-4">
      <div className="flex items-center justify-between mb-3">
        <h3 className="text-sm font-semibold text-gray-700">AI Resume Assistant</h3>
        <span className="text-xs text-gray-400">Powered by Claude</span>
      </div>

      {/* Quick prompt buttons */}
      <div className="flex flex-wrap gap-2 mb-3">
        {quickPrompts.map((qp, i) => (
          <button key={i} onClick={() => sendMessage(qp.prompt)} disabled={thinking}
            className="px-3 py-1.5 bg-purple-50 text-purple-700 rounded-full text-xs font-medium hover:bg-purple-100 border border-purple-200 disabled:opacity-50">
            {qp.label}
          </button>
        ))}
        {job && job.pdf_path && (
          <button onClick={() => sendMessage(
            "I've uploaded a PDF version of my resume for this position. Compare the PDF resume text against the job description. Identify missing keywords, suggest improvements, and rate how well it targets this specific role.",
            { include_pdf: true }
          )} disabled={thinking}
            className="px-3 py-1.5 bg-green-50 text-green-700 rounded-full text-xs font-medium hover:bg-green-100 border border-green-200 disabled:opacity-50">
            Review PDF
          </button>
        )}
      </div>

      {/* Messages area */}
      {(messages.length > 0 || thinking) && (
        <div className="border rounded-lg mb-3 overflow-y-auto space-y-3 p-3" style={{ maxHeight: '500px' }}>
          {messages.map((msg, i) => (
            <div key={i} className={msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'}>
              {msg.role === 'user' ? (
                <div className="bg-purple-600 text-white rounded-lg px-3 py-2 max-w-full text-sm whitespace-pre-wrap">
                  {msg.content}
                </div>
              ) : (
                <div className="bg-gray-50 text-gray-800 rounded-lg px-3 py-2 max-w-full text-sm ai-response border"
                  dangerouslySetInnerHTML={{ __html: renderMarkdown(msg.content) }} />
              )}
            </div>
          ))}
          {thinking && (
            <div className="flex justify-start">
              <div className="bg-gray-50 text-gray-500 rounded-lg px-3 py-2 text-sm animate-pulse border">
                Analyzing with Claude...
              </div>
            </div>
          )}
          <div ref={messagesEndRef} />
        </div>
      )}

      {/* Follow-up input */}
      <div className="flex gap-2">
        <input
          ref={inputRef}
          type="text"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input); } }}
          placeholder="Ask a follow-up question..."
          className="flex-1 px-3 py-2 border rounded text-sm focus:outline-none focus:ring-2 focus:ring-purple-400"
          disabled={thinking}
        />
        <button
          onClick={() => sendMessage(input)}
          disabled={thinking || !input.trim()}
          className="px-4 py-2 bg-purple-600 text-white rounded text-sm font-medium hover:bg-purple-700 disabled:opacity-50"
        >
          Send
        </button>
      </div>
    </div>
  );
}


function JobDetailPage({ job, appPlans = [], saveAppPlans, changeStatus, onBack }) {
  const { useState, useEffect, useCallback } = React;
  const [description, setDescription] = useState(null);
  const [companyInfo, setCompanyInfo] = useState(null);
  const [localNotes, setLocalNotes] = useState(job ? job.notes || '' : '');
  const [refreshing, setRefreshing] = useState(false);

  // Sync local notes when job changes
  useEffect(() => { if (job) setLocalNotes(job.notes || ''); }, [job && job.id]);

  // Fetch description on mount
  useEffect(() => {
    if (!job || !IS_SERVED) return;
    fetch('/api/job-description/' + job.id)
      .then(r => r.json())
      .then(data => { if (data.formatted) setDescription(data.formatted); })
      .catch(() => {});
  }, [job && job.id]);

  // Fetch company info on mount
  useEffect(() => {
    if (!job || !IS_SERVED) return;
    const name = (job.company || '').trim();
    if (!name) return;
    fetch('/api/company-info/' + encodeURIComponent(name))
      .then(r => r.json())
      .then(data => { if (!data.error) setCompanyInfo(data); })
      .catch(() => {});
  }, [job && job.company]);

  // Auto-refresh job data
  useEffect(() => {
    if (!job || !IS_SERVED) return;
    setRefreshing(true);
    fetch('/api/refresh-job/' + job.id)
      .then(r => r.json())
      .then(data => {
        if (data.error) { setRefreshing(false); return; }
        const updates = {};
        if (data.applicants && data.applicants !== job.applicants) updates.applicants = data.applicants;
        if (data.live_status) updates.live_status = data.live_status;
        if (data.live_status_checked) updates.live_status_checked = data.live_status_checked;
        if (Object.keys(updates).length > 0 && window._updateJob) window._updateJob(job.id, updates);
        setRefreshing(false);
      })
      .catch(() => setRefreshing(false));
  }, [job && job.id]);

  const saveNotes = useCallback(() => {
    if (job && window._updateJob) window._updateJob(job.id, { notes: localNotes });
  }, [job, localNotes]);

  if (!job) return (
    <div className="min-h-screen flex items-center justify-center">
      <div className="text-center">
        <p className="text-gray-500 mb-4">Job not found</p>
        <button onClick={onBack} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm">Go Back</button>
      </div>
    </div>
  );

  const currentPlan = appPlans.find(p => p.jobs.some(pj => pj.id === job.id));

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header bar */}
      <div className="bg-white border-b px-6 py-4">
        <div className="max-w-7xl mx-auto flex items-center justify-between">
          <button onClick={onBack} className="flex items-center gap-2 text-sm text-gray-500 hover:text-gray-800">
            <span>&larr;</span> Back
          </button>
          <div className="flex items-center gap-3">
            <button
              onClick={() => window._toggleFavorite && window._toggleFavorite(job.id)}
              className={"text-xl " + (job.favorited ? "text-yellow-400" : "text-gray-300 hover:text-yellow-300")}
              title={job.favorited ? "Remove from shortlist" : "Add to shortlist"}
            >
              {job.favorited ? "\u2605" : "\u2606"}
            </button>
            <select
              value={job.status}
              onChange={e => changeStatus(job.id, e.target.value)}
              className={"px-3 py-1.5 border rounded text-sm font-medium " + (STATUS_COLORS[job.status] || "")}
            >
              {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>
      </div>

      <div className="max-w-7xl mx-auto px-6 py-6">
        {/* Title section */}
        <div className="mb-6">
          <div className="flex items-start justify-between">
            <div>
              <h1 className="text-2xl font-bold text-gray-900">{job.company}</h1>
              <p className="text-lg text-gray-600 mt-1">{job.title}</p>
            </div>
            <span className={"px-3 py-1 rounded text-sm font-medium " + TIER_COLORS[job.tier]}>
              {job.tier} (Score: {job.score})
            </span>
          </div>
          {job.live_status === "closed" && (
            <span className="inline-block mt-2 px-2 py-1 rounded text-xs font-medium bg-red-50 text-red-500 border border-red-200">Position Closed</span>
          )}
        </div>

        {/* Metadata cards */}
        <div className="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-6">
          {[
            { label: "Salary", value: job.salary !== "N/A" ? job.salary : "Not listed" },
            { label: "Location", value: job.location || "Not listed" },
            { label: "Work Type", value: job.work_type || "Not listed" },
            { label: "Posted", value: job.posted_date || "Unknown" },
            { label: "Applicants", value: (job.applicants || "Unknown") + (refreshing ? " (updating...)" : "") },
          ].map(card => (
            <div key={card.label} className="bg-white rounded-lg border p-3">
              <span className="text-xs text-gray-400 block">{card.label}</span>
              <p className="font-medium text-sm text-gray-900 mt-0.5">{card.value}</p>
            </div>
          ))}
        </div>

        {/* AI Reasoning */}
        {job.ai_reasoning && (
          <div className="bg-fuchsia-50 rounded-lg border border-fuchsia-200 p-3 mb-6">
            <div className="text-xs font-semibold text-fuchsia-700 mb-1">&#129302; AI Scoring Reasoning</div>
            <p className="text-sm text-gray-700 leading-relaxed">{job.ai_reasoning}</p>
          </div>
        )}

        {/* Action buttons */}
        <div className="flex gap-2 flex-wrap mb-6">
          {job.apply_link && (
            <a href={job.apply_link} target="_blank" rel="noopener"
              className="px-4 py-2 bg-blue-600 text-white rounded text-sm font-medium hover:bg-blue-700">
              Apply
            </a>
          )}
          {job.job_link && (
            <a href={job.job_link} target="_blank" rel="noopener"
              className="px-4 py-2 bg-gray-100 text-gray-700 rounded text-sm font-medium hover:bg-gray-200 border">
              LinkedIn Posting
            </a>
          )}
          <button onClick={() => window._showResume && window._showResume(job.resume_path, job.company, job.title, job.id)}
            className="px-4 py-2 bg-gray-100 text-gray-700 rounded text-sm font-medium hover:bg-gray-200 border">
            View Resume
          </button>
          <button onClick={() => window._openAIChat && window._openAIChat(job.id, job.company + ' \u2014 ' + job.title)}
            className="px-4 py-2 bg-purple-600 text-white rounded text-sm font-medium hover:bg-purple-700">
            Ask AI
          </button>
          <button onClick={() => window._openJobDetail && window._openJobDetail(job.id)}
            className="px-4 py-2 bg-gray-800 text-white rounded text-sm font-medium hover:bg-gray-900">
            Full Page &#8599;
          </button>
          {appPlans.length > 0 && (
            <select value={currentPlan ? currentPlan.id : ""}
              onChange={e => {
                const targetId = e.target.value;
                let updated = appPlans.map(p => ({ ...p, jobs: p.jobs.filter(pj => pj.id !== job.id) }));
                if (targetId) {
                  updated = updated.map(p => p.id === targetId
                    ? { ...p, jobs: [...p.jobs, { id: job.id, company: job.company, title: job.title, notes: '' }] }
                    : p
                  );
                }
                saveAppPlans(updated);
              }}
              className={"px-4 py-2 rounded text-sm font-medium border cursor-pointer " + (currentPlan ? "bg-green-50 text-green-700 border-green-300" : "bg-gray-100 text-gray-700 hover:bg-gray-200")}
            >
              <option value="">Add to Plan...</option>
              {appPlans.map(p => {
                const already = p.jobs.some(pj => pj.id === job.id);
                return <option key={p.id} value={p.id}>{p.title}{already ? ' \u2713' : ''}</option>;
              })}
            </select>
          )}
          <button
            onClick={() => { if (confirm('Delete ' + job.company + ' \u2014 ' + job.title + '?')) { fetch('/api/delete-jobs', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ids: [job.id]}) }).then(() => { window.location.hash = '#/jobs'; window.location.reload(); }); }}}
            className="px-4 py-2 bg-red-50 text-red-600 rounded text-sm font-medium hover:bg-red-100 border border-red-200">
            Delete Job
          </button>
        </div>

        {/* Two column layout */}
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
          {/* Left column - 60% */}
          <div className="lg:col-span-3 space-y-6">
            {/* Status Timeline */}
            {Object.keys(job.timestamps || {}).length > 0 && (
              <div className="bg-white rounded-lg border p-4">
                <h3 className="text-sm font-semibold text-gray-700 mb-3">Status Timeline</h3>
                <div className="space-y-2">
                  {STATUSES.filter(s => job.timestamps[s]).map((s, i, arr) => {
                    const ts = job.timestamps[s];
                    const d = new Date(ts);
                    const dateStr = d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"});
                    let diff = null;
                    if (i > 0) {
                      const prevTs = job.timestamps[arr[i - 1]];
                      if (prevTs) {
                        const days = Math.round((ts - prevTs) / (1000 * 60 * 60 * 24) * 10) / 10;
                        diff = days + "d";
                      }
                    }
                    return (
                      <div key={s} className="flex items-center gap-3 text-sm">
                        <span className={"w-2.5 h-2.5 rounded-full flex-shrink-0 " + (STATUS_COLORS[s]?.split(" ")[0] || "bg-gray-300")}></span>
                        <span className="font-medium w-28">{s}</span>
                        <span className="text-gray-500">{dateStr}</span>
                        {diff && <span className="text-gray-400 ml-1">({diff})</span>}
                      </div>

            )}

            {/* Job Description */}
            <div className="bg-white rounded-lg border p-4">
              <h3 className="text-sm font-semibold text-gray-700 mb-3">Job Description</h3>
              {description ? (
                <div className="prose prose-sm max-w-none text-gray-700" dangerouslySetInnerHTML={{ __html: description }} />
              ) : job.description ? (
                <div className="prose prose-sm max-w-none text-gray-700 whitespace-pre-wrap">{job.description}</div>
              ) : (
                <p className="text-gray-400 text-sm">No description available</p>

            {/* Company Info */}
            {companyInfo && (
              <div className="bg-white rounded-lg border p-4">
                <h3 className="text-sm font-semibold text-gray-700 mb-3">Company Info</h3>
                <div className="flex items-start gap-4">
                  {companyInfo.logo_url && (
                    <img src={companyInfo.logo_url} alt="" className="w-12 h-12 rounded-lg object-contain border" />

                    {companyInfo.industry && <p><span className="text-gray-400">Industry:</span> <span className="text-gray-700">{companyInfo.industry}</span></p>}
                    {companyInfo.known_for && <p><span className="text-gray-400">Known for:</span> <span className="text-gray-700">{companyInfo.known_for}</span></p>}
                    {companyInfo.website && (
                      <p><span className="text-gray-400">Website:</span>{' '}

          {/* Right column - 40% */}
          <div className="lg:col-span-2 space-y-6">

                value={localNotes}

                onBlur={saveNotes}
                placeholder="Add notes about this position..."
                className="w-full px-3 py-2 border rounded text-sm h-40 resize-none focus:outline-none focus:ring-2 focus:ring-blue-400"
              />

            {/* Resume */}
            <div className="bg-white rounded-lg border p-4">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-sm font-semibold text-gray-700">Resume</h3>
                {job.pdf_path && (
                  <a href={job.pdf_path} target="_blank" rel="noopener"
                    className="text-xs text-blue-500 hover:text-blue-700 underline">
                    Open in new tab
                  </a>
                )}
              </div>
              <button
                onClick={() => window._showResume && window._showResume(job.resume_path, job.company, job.title, job.id)}

              >
                View Text Resume
              </button>
              {job.pdf_path ? (
                <div className="mb-3 rounded border overflow-hidden" style={{height: '500px'}}>
                  <iframe
                    src={job.pdf_path}
                    className="w-full h-full"
