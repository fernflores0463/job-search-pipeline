                    title="Resume Preview"
                  />
                </div>
              ) : null}
              <BatchPdfDropZone job={job} />
            </div>

            {/* AI Resume Assistant */}
            {IS_SERVED && <AIResumeAssistant job={job} />}
          </div>
        </div>
      </div>
    </div>
  );
}


function BatchDetailView({ jobs, batchDate, onBack, appPlans = [], saveAppPlans }) {
  const { useState, useMemo, useCallback } = React;
  const [tierFilter, setTierFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');
  const [searchTerm, setSearchTerm] = useState('');
  const [sortBy, setSortBy] = useState('score');
  const [sortDir, setSortDir] = useState('desc');
  const [expandedJobId, setExpandedJobId] = useState(null);
  const [descCache, setDescCache] = useState({});
  const [companyCache, setCompanyCache] = useState({});

  const LINKEDIN_PROFILE = window.__APP_CONFIG.linkedin_url || '';

  // Auto-refresh job data when expanded
  const [refreshingJobId, setRefreshingJobId] = useState(null);
  React.useEffect(() => {
    if (!expandedJobId) return;
    let cancelled = false;
    setRefreshingJobId(expandedJobId);
    fetch("/api/refresh-job/" + expandedJobId)
      .then(r => r.json())
      .then(data => {
        if (cancelled || data.error) { setRefreshingJobId(null); return; }
        if (data.applicants || data.live_status || data.status) {
          // Update via global functions so App state stays in sync
          if (window._updateJob) {
            const updates = {};
            if (data.applicants) updates.applicants = data.applicants;
            if (data.live_status) updates.live_status = data.live_status;
            if (data.live_status_checked) updates.live_status_checked = data.live_status_checked;
            if (data.status) updates.status = data.status;
            window._updateJob(expandedJobId, updates);
          }
        }
        setRefreshingJobId(null);
      })
      .catch(() => setRefreshingJobId(null));
    return () => { cancelled = true; };
  }, [expandedJobId]);

  const fetchDescription = (id) => {
    if (descCache[id]) return;
    setDescCache(prev => ({ ...prev, [id]: { loading: true } }));
    fetch('/api/job-description/' + id)
      .then(r => r.json())
      .then(data => setDescCache(prev => ({ ...prev, [id]: { html: data.formatted || '', text: data.description || 'No description available.' } })))
      .catch(() => setDescCache(prev => ({ ...prev, [id]: { error: true } })));
  };

  const fetchCompanyInfo = (companyName) => {
    const key = (companyName || '').trim().toLowerCase();
    if (companyCache[key]) return;
    setCompanyCache(prev => ({ ...prev, [key]: { loading: true } }));
    fetch('/api/company-info/' + encodeURIComponent(companyName))
      .then(r => r.json())
      .then(data => setCompanyCache(prev => ({ ...prev, [key]: data })))
      .catch(() => setCompanyCache(prev => ({ ...prev, [key]: { error: true } })));
  };

  const batchJobs = useMemo(() => jobs.filter(j => (j.import_date || 'Unknown') === batchDate), [jobs, batchDate]);

  const tierCounts = useMemo(() => {
    const c = { all: batchJobs.length, 'Strong Match': 0, 'Match': 0, 'Weak Match': 0 };
    batchJobs.forEach(j => { if (c[j.tier] !== undefined) c[j.tier]++; });
    return c;
  }, [batchJobs]);

  const statusCounts = useMemo(() => {
    const c = {};
    batchJobs.forEach(j => { const s = j.status || 'New'; c[s] = (c[s] || 0) + 1; });
    return c;
  }, [batchJobs]);

  const filtered = useMemo(() => {
    let result = batchJobs;
    if (tierFilter !== 'all') result = result.filter(j => j.tier === tierFilter);
    if (statusFilter !== 'all') result = result.filter(j => (j.status || 'New') === statusFilter);
    if (searchTerm.length >= 2) {
      const term = searchTerm.toLowerCase();
      result = result.filter(j => j.company.toLowerCase().includes(term) || j.title.toLowerCase().includes(term));
    }
    result = [...result].sort((a, b) => {
      let av, bv;
      if (sortBy === 'score') { av = a.score; bv = b.score; }
      else if (sortBy === 'company') { av = a.company.toLowerCase(); bv = b.company.toLowerCase(); }
      else if (sortBy === 'title') { av = a.title.toLowerCase(); bv = b.title.toLowerCase(); }
      else if (sortBy === 'tier') { const order = { 'Strong Match': 0, 'Match': 1, 'Weak Match': 2 }; av = order[a.tier]; bv = order[b.tier]; }
      else if (sortBy === 'status') { av = (a.status || 'New').toLowerCase(); bv = (b.status || 'New').toLowerCase(); }
      else if (sortBy === 'salary') { av = a.salary || ''; bv = b.salary || ''; }
      else { av = a.score; bv = b.score; }
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return result;
  }, [batchJobs, tierFilter, statusFilter, searchTerm, sortBy, sortDir]);

  const toggleSort = (col) => {
    if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortBy(col); setSortDir(col === 'company' || col === 'title' ? 'asc' : 'desc'); }
  };

  const sortArrow = (col) => sortBy === col ? (sortDir === 'asc' ? ' \u25B2' : ' \u25BC') : '';

  const topCompanies = useMemo(() => {
    const counts = {};
    batchJobs.forEach(j => { counts[j.company] = (counts[j.company] || 0) + 1; });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);
  }, [batchJobs]);

  return (
    <div className="p-6">
      {/* Header */}
      <div className="flex items-center gap-4 mb-4">
        <button onClick={onBack} className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded text-sm font-medium hover:bg-gray-200 border">
          &larr; Back to Stats
        </button>
        <div>
          <h2 className="text-xl font-bold text-gray-900">Batch: {batchDate}</h2>
          <p className="text-sm text-gray-500">{batchJobs.length} jobs total</p>
        </div>
      </div>

      {/* Summary cards */}
      <div className="grid grid-cols-4 gap-3 mb-4">
        <div className="bg-white border rounded-lg p-3 text-center">
          <p className="text-2xl font-bold text-gray-900">{tierCounts.all}</p>
          <p className="text-xs text-gray-500">Total Jobs</p>
        </div>
        <div className="bg-green-50 border border-green-200 rounded-lg p-3 text-center">
          <p className="text-2xl font-bold text-green-700">{tierCounts['Strong Match']}</p>
          <p className="text-xs text-green-600">Strong Match</p>
        </div>
        <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-center">
          <p className="text-2xl font-bold text-blue-700">{tierCounts['Match']}</p>
          <p className="text-xs text-blue-600">Match</p>
        </div>
        <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-center">
          <p className="text-2xl font-bold text-yellow-700">{tierCounts['Weak Match']}</p>
          <p className="text-xs text-yellow-600">Weak Match</p>
        </div>
      </div>

      {/* Top companies bar */}
      {topCompanies.length > 0 && (
        <div className="bg-white border rounded-lg p-4 mb-4">
          <h3 className="text-sm font-semibold text-gray-700 mb-2">Top Companies in This Batch</h3>
          <div className="flex gap-2 flex-wrap">
            {topCompanies.map(([name, count]) => (
              <span key={name} className="px-2 py-1 bg-gray-100 rounded text-xs text-gray-700 font-medium">{name} ({count})</span>
            ))}
          </div>
        </div>
      )}

      {/* Filters row */}
      <div className="bg-white border rounded-lg p-4 mb-4">
        <div className="flex gap-3 flex-wrap items-center">
          <input
            type="text" placeholder="Search company or title..."
            value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
            className="px-3 py-1.5 border rounded text-sm w-64"
          />
          <div className="flex gap-1 items-center">
            <span className="text-xs text-gray-500 mr-1">Tier:</span>
            {[{ key: 'all', label: 'All' }, { key: 'Strong Match', label: 'Strong' }, { key: 'Match', label: 'Match' }, { key: 'Weak Match', label: 'Weak' }].map(f => (
              <button key={f.key}
                onClick={() => setTierFilter(f.key)}
                className={"px-2 py-0.5 rounded text-xs font-medium " + (tierFilter === f.key ? "bg-blue-600 text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200")}>
                {f.label}
              </button>
            ))}
          </div>
          <div className="flex gap-1 items-center">
            <span className="text-xs text-gray-500 mr-1">Status:</span>
            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}
              className="px-2 py-1 border rounded text-xs">
              <option value="all">All Statuses</option>
              {Object.entries(statusCounts).sort((a,b) => b[1]-a[1]).map(([s, c]) => (
                <option key={s} value={s}>{s} ({c})</option>
              ))}
            </select>
          </div>
          <span className="text-xs text-gray-400 ml-auto">{filtered.length} of {batchJobs.length} shown</span>
        </div>
      </div>

      {/* Job table */}
      <div className="bg-white border rounded-lg overflow-hidden">
        <table className="w-full text-sm">
          <thead>
            <tr className="bg-gray-50 border-b text-left text-xs text-gray-500">
              <th className="py-2 px-3 cursor-pointer hover:text-gray-800" onClick={() => toggleSort('score')}>Score{sortArrow('score')}</th>
              <th className="py-2 px-3 cursor-pointer hover:text-gray-800" onClick={() => toggleSort('tier')}>Tier{sortArrow('tier')}</th>
              <th className="py-2 px-3 cursor-pointer hover:text-gray-800" onClick={() => toggleSort('company')}>Company{sortArrow('company')}</th>
              <th className="py-2 px-3 cursor-pointer hover:text-gray-800" onClick={() => toggleSort('title')}>Title{sortArrow('title')}</th>
              <th className="py-2 px-3 cursor-pointer hover:text-gray-800" onClick={() => toggleSort('salary')}>Salary{sortArrow('salary')}</th>
              <th className="py-2 px-3 cursor-pointer hover:text-gray-800" onClick={() => toggleSort('status')}>Status{sortArrow('status')}</th>
              <th className="py-2 px-3">Actions</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(j => {
              const tc = j.tier === 'Strong Match' ? 'text-green-700 bg-green-50' :
                         j.tier === 'Match' ? 'text-blue-700 bg-blue-50' : 'text-yellow-700 bg-yellow-50';
              const isExpanded = expandedJobId === j.id;
              return (
                <React.Fragment key={j.id}>
                  <tr className={"border-b cursor-pointer " + (isExpanded ? "bg-blue-50" : "hover:bg-gray-50")}
                      onClick={() => { if (!isExpanded) { fetchDescription(j.id); fetchCompanyInfo(j.company); } setExpandedJobId(isExpanded ? null : j.id); }}>
                    <td className="py-2 px-3 font-bold text-gray-700">{j.score}</td>
                    <td className="py-2 px-3">
                      <span className={"px-1.5 py-0.5 rounded text-xs font-medium " + tc}>
                        {j.tier === 'Strong Match' ? 'Strong' : j.tier === 'Match' ? 'Match' : 'Weak'}
                      </span>
                    </td>
                    <td className="py-2 px-3 font-medium text-gray-800 truncate" style={{maxWidth: '180px'}} title={j.company}>{j.company}</td>
                    <td className="py-2 px-3 text-gray-600 truncate" style={{maxWidth: '250px'}} title={j.title}>{j.title}</td>
                    <td className="py-2 px-3 text-gray-600 text-xs">{j.salary !== 'N/A' ? j.salary : ''}</td>
                    <td className="py-2 px-3">
                      <select value={j.status || 'New'}
                        onClick={e => e.stopPropagation()}
                        onChange={e => { e.stopPropagation(); window._changeStatus && window._changeStatus(j.id, e.target.value); }}
                        className="text-xs border rounded px-1 py-0.5 bg-white cursor-pointer">
                        {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                    </td>
                    <td className="py-2 px-3">
                      <div className="flex gap-1">
                        <button onClick={e => { e.stopPropagation(); window._showJobDetail && window._showJobDetail(j.id); }}
                          className="px-2 py-0.5 bg-purple-600 text-white rounded text-xs hover:bg-purple-700" title="Edit Details">Edit</button>
                        <button onClick={e => { e.stopPropagation(); window._toggleFavorite && window._toggleFavorite(j.id); }}
                          className="text-sm" title={j.favorited ? 'Unfavorite' : 'Favorite'}>{j.favorited ? '\u2605' : '\u2606'}</button>
                      </div>
                    </td>
                  </tr>
                  {isExpanded && (
                    <tr>
                      <td colSpan="7" className="p-0">
                        <div className="bg-white border-t border-b border-blue-100 p-4">
                          <div className="flex justify-between items-start mb-3">
                            <div>
                              <h4 className="font-bold text-gray-900">{j.company}</h4>
                              <p className="text-sm text-gray-600">{j.title}</p>
                              <div className="flex items-center gap-3 mt-1 text-xs text-gray-500">
                                {j.location && <span>{j.location}</span>}
                                {j.work_type && <span>{j.work_type}</span>}
                                {j.posted_date && <span>Posted: {j.posted_date}</span>}
                                {j.applicants && <span>Applicants: {j.applicants}{refreshingJobId === j.id && <span className="ml-1 animate-pulse">updating...</span>}</span>}
                              </div>
                            </div>
                            <button onClick={(e) => { e.stopPropagation(); setExpandedJobId(null); }}
                              className="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
                          </div>
                          {/* AI Reasoning */}
                          {j.ai_reasoning && (
                            <div className="bg-fuchsia-50 rounded border border-fuchsia-200 p-2 mb-3">
                              <div className="text-xs font-semibold text-fuchsia-700 mb-1">&#129302; AI Reasoning</div>
                              <p className="text-xs text-gray-700 leading-relaxed">{j.ai_reasoning}</p>
                            </div>
                          )}
                          {/* Description + Company Info */}
                          <div className="flex gap-4 mb-3">
                            <div className="flex-1 min-w-0">
                              {(() => {
                                const desc = descCache[j.id];
                                if (!desc) return null;
                                return (
                                  <div>
                                    <span className="text-xs text-gray-400 block mb-1">Description</span>
                                    {desc.loading ? (
                                      <p className="text-xs text-gray-400">Loading...</p>
                                    ) : desc.error ? (
                                      <p className="text-xs text-red-400">Failed to load description.</p>
                                    ) : desc.html ? (
                                      <div className="bg-gray-50 border rounded p-3 max-h-96 overflow-auto max-w-3xl text-xs"
                                        dangerouslySetInnerHTML={{ __html: desc.html }} />
                                    ) : (
                                      <div className="text-xs text-gray-700 bg-gray-50 border rounded p-2 max-h-96 overflow-auto whitespace-pre-wrap max-w-3xl">{desc.text}</div>
                                    )}
                                  </div>
                                );
                              })()}
                            </div>
                            {(() => {
                              const key = (j.company || '').trim().toLowerCase();
                              const info = companyCache[key];
                              if (!info) return null;
                              if (info.loading) return (
                                <div className="w-72 flex-shrink-0">
                                  <span className="text-xs text-gray-400 block mb-1">Company</span>
                                  <div className="bg-gray-50 border rounded p-3 text-xs text-gray-400">Loading...</div>
                                </div>
                              );
                              if (info.error || !info.summary) return null;
                              return (
                                <div className="w-72 flex-shrink-0">
                                  <span className="text-xs text-gray-400 block mb-1">Company</span>
                                  <div className="bg-gray-50 border rounded p-3">
                                    {info.logo_url && <img src={info.logo_url} alt="" className="h-8 mb-2 object-contain"
                                      onError={e => { e.target.style.display = 'none'; }} />}
                                    <p className="text-xs font-semibold text-gray-800">{j.company}</p>
                                    {info.industry && <p className="text-xs text-gray-500">{info.industry}</p>}
                                    {info.known_for && <p className="text-xs text-gray-700 mt-1">{info.known_for}</p>}
                                    {info.summary && info.summary !== info.known_for && (
                                      <details className="mt-1">
                                        <summary className="text-xs text-blue-500 cursor-pointer">More about {j.company}</summary>
                                        <p className="text-xs text-gray-600 mt-1 leading-relaxed">{info.summary.slice(info.known_for.length).trim()}</p>
                                      </details>
                                    )}
                                    {info.website && (
                                      <a href={'https://' + info.website} target="_blank" rel="noopener"
                                        onClick={e => e.stopPropagation()}
                                        className="text-xs text-blue-500 hover:underline mt-2 block">{info.website}</a>
                                    )}
                                  </div>
                                </div>
                              );
                            })()}
                          </div>
                          {/* Action buttons */}
                          <div className="flex gap-2 flex-wrap items-center">
                            {j.apply_link && (
                              <a href={j.apply_link} target="_blank" rel="noopener" onClick={e => e.stopPropagation()}
                                className="px-2.5 py-1 bg-blue-600 text-white rounded text-xs font-medium hover:bg-blue-700">Apply</a>
                            )}
                            {j.job_link && (
                              <a href={j.job_link} target="_blank" rel="noopener" onClick={e => e.stopPropagation()}
                                className="px-2.5 py-1 bg-gray-100 text-gray-700 rounded text-xs font-medium hover:bg-gray-200 border">LinkedIn Posting</a>
                            )}
                            {j.resume_path && (
                              <button onClick={e => { e.stopPropagation(); window._showResume && window._showResume(j.resume_path, j.company, j.title, j.id); }}
                                className="px-2.5 py-1 bg-gray-100 text-gray-700 rounded text-xs font-medium hover:bg-gray-200 border">View Resume</button>
                            )}
                            {j.pdf_path && (
                              <a href={'/' + j.pdf_path} target="_blank" rel="noopener" onClick={e => e.stopPropagation()}
                                className="px-2.5 py-1 bg-green-600 text-white rounded text-xs font-medium hover:bg-green-700">View PDF Resume</a>
                            )}
                            <button onClick={e => {
                                e.stopPropagation();
                                navigator.clipboard.writeText(LINKEDIN_PROFILE).then(() => {
                                  e.target.textContent = 'Copied!';
                                  setTimeout(() => { e.target.textContent = 'Copy My LinkedIn'; }, 1500);
                                });
                              }}
                              className="px-2.5 py-1 bg-blue-100 text-blue-700 rounded text-xs font-medium hover:bg-blue-200 border border-blue-200">Copy My LinkedIn</button>
                            {(() => {
                              const plans = window._getPlans ? window._getPlans() : [];
                              if (!plans.length) return null;
                              const currentPlan = plans.find(p => p.jobs.some(pj => pj.id === j.id));
                              return (
                                <select value={currentPlan ? currentPlan.id : ""} onClick={e => e.stopPropagation()}
                                  onChange={e => {
                                    e.stopPropagation();
                                    if (e.target.value) {
                                      window._addJobToPlan && window._addJobToPlan(e.target.value, j);
                                    } else if (window._syncAppPlans && window._getPlans) {
                                      const updated = window._getPlans().map(p => ({ ...p, jobs: p.jobs.filter(pj => pj.id !== j.id) }));
                                      window._syncAppPlans(updated);
                                      fetch('/api/plans', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(updated) });
                                    }
                                  }}
                                  className={"px-2.5 py-1 rounded text-xs font-medium border cursor-pointer " + (currentPlan ? "bg-green-100 text-green-700 border-green-300" : "bg-gray-100 text-gray-700 hover:bg-gray-200")}>
                                  <option value="">Add to Plan...</option>
                                  {plans.map(p => {
                                    const already = p.jobs.some(pj => pj.id === j.id);
                                    return <option key={p.id} value={p.id} >{p.title}{already ? ' ✓' : ''}</option>;
                                  })}
                                </select>
                              );
                            })()}
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
        {filtered.length === 0 && (
          <div className="p-8 text-center text-gray-400 text-sm">No jobs match the current filters.</div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [jobs, setJobs] = useState([]);
  const [batchStats, setBatchStats] = useState([]);
  const [view, setView, batchDetailDate, setHashBatchDate, selectedId, setHashJobId, jobDetailId, setJobDetailId, planDetailId, setPlanDetailId] = useHashRoute();
  const [loaded, setLoaded] = useState(!IS_SERVED);
  const [filters, setFilters] = useState({
    tiers: [], statuses: [], search: "", favoritesOnly: false, aiScoredOnly: false
  });
  const [sortBy, setSortBy] = useState("score");
  const [sortDir, setSortDir] = useState("desc");

  // Wrappers that update both state and hash
  const setBatchDetailDate = useCallback((date) => {
    if (date) {
      setHashBatchDate(date);
      window.location.hash = '#/batch/' + encodeURIComponent(date);
    } else {
      setHashBatchDate(null);
      window.location.hash = '#/stats';
    }
  }, []);

  const setSelectedId = useCallback((id) => {
    if (id) {
      setHashJobId(id);
      window.location.hash = '#/job/' + id;
    } else {
      setHashJobId(null);
      window.location.hash = '#/jobs';
    }
  }, []);

  const [updateStatus, setUpdateStatus] = useState(null);
  const [liveCheckStatus, setLiveCheckStatus] = useState(null);
  const [liveCheckBatch, setLiveCheckBatch] = useState("all");
  const [showScrape, setShowScrape] = useState(false);
  const [scrapeUrl, setScrapeUrl] = useState('');
  const [scrapeCompany, setScrapeCompany] = useState('');
  const [scrapeStatus, setScrapeStatus] = useState(null);

  const [showImport, setShowImport]         = useState(false);
  const [importFile, setImportFile]         = useState(null);
  const [importLocation, setImportLocation] = useState('');
  const [importStatus, setImportStatus]     = useState(null);

  const [showAICsvImport, setShowAICsvImport]   = useState(false);
  const [aiCsvFile, setAiCsvFile]               = useState(null);
  const [aiCsvLocation, setAiCsvLocation]       = useState('');
  const [aiCsvStatus, setAiCsvStatus]           = useState(null);

  const [showAIImport, setShowAIImport] = useState(false);
  const [aiImportUrl, setAiImportUrl] = useState('');
  const [aiImportCompany, setAiImportCompany] = useState('');
  const [aiImportStatus, setAiImportStatus] = useState(null);

  const [showManualAdd, setShowManualAdd] = useState(false);
  const [manualJob, setManualJob] = useState({ company: '', title: '', description: '', job_link: '', apply_link: '', location: '', salary: '', work_type: '' });
  const [manualAddStatus, setManualAddStatus] = useState(null);

  const inferLocationFromFilename = (filename) => {
    const STOP_WORDS = /\b(jobs?|export|linkedin|easy|apply|results?|search|csv|import)\b/gi;
    return filename
      .replace(/\.csv$/i, '')
      .replace(/[_\-]+/g, ' ')
      .replace(STOP_WORDS, '')
      .replace(/\s+/g, ' ')
      .trim();
  };

  const startImport = useCallback(() => {
    if (!importFile) return;
    const qs = importLocation.trim()
      ? `?location=${encodeURIComponent(importLocation.trim())}` : '';
    fetch(`/api/import-csv${qs}`, {
      method: 'POST', body: importFile,
      headers: { 'Content-Type': 'text/csv' },
    }).then(r => r.json()).then(() => {
      setImportStatus({ running: true, message: 'Starting...' });
      const poll = setInterval(() =>
        fetch('/api/import-status').then(r => r.json()).then(s => {
          setImportStatus(s);
          if (!s.running) clearInterval(poll);
        }), 1500);
    });
  }, [importFile, importLocation]);

  const startAICsvImport = useCallback(() => {
    if (!aiCsvFile) return;
    const qs = aiCsvLocation.trim()
      ? `?location=${encodeURIComponent(aiCsvLocation.trim())}` : '';
    fetch(`/api/import-csv-ai${qs}`, {
      method: 'POST', body: aiCsvFile,
      headers: { 'Content-Type': 'text/csv' },
    }).then(r => r.json()).then(data => {
      if (data.error) {
        setAiCsvStatus({ running: false, message: 'Error: ' + data.error });
        return;
      }
      setAiCsvStatus({ running: true, message: 'Starting AI scoring...', progress: 0, total: 0, scored_ai: 0, scored_fallback: 0, estimated_cost: 0 });
      const poll = setInterval(() =>
        fetch('/api/ai-import-status').then(r => r.json()).then(s => {
          setAiCsvStatus(s);
          if (!s.running) clearInterval(poll);
        }), 1500);
    });
  }, [aiCsvFile, aiCsvLocation]);

  const startScrape = useCallback(() => {
    if (!scrapeUrl.trim()) return;
    fetch('/api/scrape-careers', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ url: scrapeUrl.trim(), company: scrapeCompany.trim() || undefined }),
    }).then(r => r.json()).then(() => {
      setScrapeStatus({ running: true, message: 'Starting...' });
      const poll = setInterval(() => {
        fetch('/api/scrape-status').then(r => r.json()).then(s => {
          setScrapeStatus(s);
          if (!s.running) clearInterval(poll);
        });
      }, 2000);
    });
  }, [scrapeUrl, scrapeCompany]);

  const startApplicantUpdate = useCallback(async () => {
    try {
      const res = await fetch("/api/run-update-applicants", { method: "POST" });
      const data = await res.json();
      if (data.ok) {
        setUpdateStatus({ running: true, progress: 0, total: 0, updated: 0, message: "Starting..." });
        // Poll for progress and update table in real time
        const poll = setInterval(async () => {
          try {
            const [statusRes, stateRes] = await Promise.all([
              fetch("/api/update-status"),
              fetch("/api/state"),
            ]);
            const s = await statusRes.json();
            const serverState = await stateRes.json();
            setUpdateStatus(s);
            // Merge latest applicant counts into displayed jobs
            setJobs(prev => prev.map(j => {
              const saved = serverState[j.id];
              if (saved?.applicants && saved.applicants !== j.applicants) {
                return { ...j, applicants: saved.applicants };
              }
              return j;
            }));
            if (!s.running) {
              clearInterval(poll);
            }
          } catch { clearInterval(poll); }
        }, 3000);
      }
    } catch (e) {
      setUpdateStatus({ running: false, message: "Error: " + e.message });
    }
  }, []);

  const startLiveCheck = useCallback(async () => {
    try {
      const body = liveCheckBatch === "all" ? {} : { batch: liveCheckBatch };
      const res = await fetch("/api/run-live-check", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.ok) {
        setLiveCheckStatus({ running: true, progress: 0, total: 0, closed: 0, live: 0, auto_updated: 0, message: "Starting..." });
        const poll = setInterval(async () => {
          try {
            const [statusRes, stateRes] = await Promise.all([
              fetch("/api/live-check-status"),
              fetch("/api/state"),
            ]);
            const s = await statusRes.json();
            const serverState = await stateRes.json();
            setLiveCheckStatus(s);
            setJobs(prev => prev.map(j => {
              const saved = serverState[j.id];
              if (saved) {
                const updates = {};
                if (saved.live_status && saved.live_status !== j.live_status) updates.live_status = saved.live_status;
                if (saved.live_status_checked) updates.live_status_checked = saved.live_status_checked;
                if (saved.status && saved.status !== j.status) updates.status = saved.status;
                if (Object.keys(updates).length > 0) return { ...j, ...updates };
              }
              return j;
            }));
            if (!s.running) clearInterval(poll);
          } catch { clearInterval(poll); }
        }, 3000);
      }
    } catch (e) {
      setLiveCheckStatus({ running: false, message: "Error: " + e.message });
    }
  }, [liveCheckBatch]);

  // Load jobs + batch stats from API on mount
  useEffect(() => {
    if (!IS_SERVED) return;
    Promise.all([
      fetch('/api/jobs-data').then(r => r.json()),
      fetch('/api/batch-stats').then(r => r.json()),
    ]).then(([apiJobs, apiStats]) => {
      setJobs(initJobsFromApi(Array.isArray(apiJobs) ? apiJobs : []));
      setBatchStats(Array.isArray(apiStats) ? apiStats : []);
      setLoaded(true);
    }).catch(() => setLoaded(true));
  }, []);

  const updateJob = useCallback((id, updates) => {
    setJobs(prev => prev.map(j => {
      if (j.id !== id) return j;
      const updated = { ...j, ...updates };
      saveJobState(id, {
        status: updated.status,
        notes: updated.notes,
        timestamps: updated.timestamps,
        favorited: updated.favorited,
        pdf_path: updated.pdf_path,
      });
      return updated;
    }));
  }, []);

  const changeStatus = useCallback((id, newStatus) => {
    setJobs(prev => prev.map(j => {
      if (j.id !== id) return j;
      const ts = { ...j.timestamps, [newStatus]: Date.now() };
      const updated = { ...j, status: newStatus, timestamps: ts };
      saveJobState(id, { status: updated.status, notes: updated.notes, timestamps: ts, favorited: updated.favorited, pdf_path: updated.pdf_path, live_status: updated.live_status, live_status_checked: updated.live_status_checked });
      return updated;
    }));
  }, []);

  const toggleFavorite = useCallback((id, e) => {
    if (e) e.stopPropagation();
    setJobs(prev => prev.map(j => {
      if (j.id !== id) return j;
      const updated = { ...j, favorited: !j.favorited };
      saveJobState(id, { status: updated.status, notes: updated.notes, timestamps: updated.timestamps, favorited: updated.favorited, pdf_path: updated.pdf_path, live_status: updated.live_status, live_status_checked: updated.live_status_checked });
      return updated;
    }));
  }, []);

  const uploadPdfFile = useCallback(async (job, file) => {
    if (!file || !job.id) return;
    try {
      const res = await fetch("/api/upload-resume/" + encodeURIComponent(job.id), {
        method: "POST",
        body: file,
      });
      const result = await res.json();
      if (result.ok) {
        const pdfPath = result.path;
        setJobs(prev => prev.map(j => {
          if (j.id !== job.id) return j;
          const updated = { ...j, pdf_path: pdfPath };
          saveJobState(j.id, { status: j.status, notes: j.notes, timestamps: j.timestamps, favorited: j.favorited, pdf_path: pdfPath });
          return updated;
        }));
      }
    } catch (err) {
      console.error("Upload failed:", err);
    }
  }, []);

  const handlePdfUpload = useCallback((job, e) => {
    const file = e.target.files[0];
    uploadPdfFile(job, file);
    e.target.value = "";
  }, [uploadPdfFile]);

  // Expose globally so StatsPanel batch detail and JobDetailModal can use them
  useEffect(() => {
    window._uploadPdf = uploadPdfFile;
    window._changeStatus = changeStatus;
    window._updateJob = updateJob;
    window._toggleFavorite = toggleFavorite;
    window._handlePdfUpload = handlePdfUpload;
    window._getJobById = (id) => jobs.find(j => j.id === id) || null;
    return () => {
      delete window._uploadPdf;
      delete window._changeStatus;
      delete window._updateJob;
      delete window._toggleFavorite;
      delete window._handlePdfUpload;
      delete window._getJobById;
    };
  }, [uploadPdfFile, changeStatus, updateJob, toggleFavorite, handlePdfUpload, jobs]);

  // Plans state lifted to App so _getPlans / _addJobToPlan are available on all tabs
  const [appPlans, setAppPlans] = useState([]);
  useEffect(() => {
    fetch('/api/plans').then(r => r.json()).then(data => {
      if (Array.isArray(data)) setAppPlans(data);
    }).catch(() => {});
  }, []);

  const saveAppPlans = useCallback((updated) => {
    setAppPlans(updated);
    fetch('/api/plans', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(updated),
    }).catch(() => {});
  }, []);

  useEffect(() => {
    window._getPlans = () => appPlans;
    window._addJobToPlan = (planId, job) => {
      const plan = appPlans.find(p => p.id === planId);
      if (!plan) return;
      if (plan.jobs.some(j => j.id === job.id)) return;
      // Remove from any other plan first (job can only be in one plan)
      let updated = appPlans.map(p => ({
        ...p,
        jobs: p.jobs.filter(j => j.id !== job.id),
      }));
      // Add to the target plan
      updated = updated.map(p => p.id === planId
        ? { ...p, jobs: [...p.jobs, { id: job.id, company: job.company, title: job.title, notes: '' }] }
        : p
      );
      saveAppPlans(updated);
    };
    window._syncAppPlans = (updated) => setAppPlans(updated);
    window._openBatchDetail = (date) => setBatchDetailDate(date);
    window._openJobDetail = (id) => { window.location.hash = '#/job-detail/' + id; };

    return () => { delete window._getPlans; delete window._addJobToPlan; delete window._syncAppPlans; delete window._openBatchDetail; delete window._openJobDetail; delete window._openPlanDetail; };

    if (filters.statuses.length > 0)
      result = result.filter(j => filters.statuses.includes(j.status));
    if (filters.search) {

      result = result.filter(j =>
        j.company.toLowerCase().includes(s) || j.title.toLowerCase().includes(s) || j.id.toLowerCase().includes(s)
      );
    }
    result = [...result].sort((a, b) => {
      let v = 0;
      if (sortBy === "score") v = a.score - b.score;
      else if (sortBy === "company") v = a.company.localeCompare(b.company);
      else if (sortBy === "salary") v = (a.salary || "").localeCompare(b.salary || "");
      else if (sortBy === "status") v = STATUSES.indexOf(a.status) - STATUSES.indexOf(b.status);
      else if (sortBy === "tier") {
        const order = {"Strong Match": 0, "Match": 1, "Weak Match": 2};
        v = order[a.tier] - order[b.tier];

      else if (sortBy === "applicants") {
        const parseNum = s => { const m = (s || "").match(/(\d+)/); return m ? parseInt(m[1]) : 0; };
        v = parseNum(a.applicants) - parseNum(b.applicants);
      }
      return sortDir === "desc" ? -v : v;
    });
    return result;

            </div>
            <button
              onClick={async () => {

                  return;
                }

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(manualJob),
                  });
                  const data = await res.json();
                  if (data.ok) {
                    setManualAddStatus({ loading: false, message: `Added: ${data.job.company} \u2014 ${data.job.title} (${data.job.tier}, Score: ${data.job.score})`, jobId: data.job.id });
                    setManualJob({ company: '', title: '', description: '', job_link: '', apply_link: '', location: '', salary: '', work_type: '' });
                    setTimeout(() => window.location.reload(), 5000);

                    setManualAddStatus({ loading: false, message: 'Error: ' + data.error });

                <a href={'#/job-detail/' + manualAddStatus.jobId}
                  className="ml-2 text-green-700 underline font-medium hover:text-green-900"
                  onClick={e => { e.preventDefault(); window.location.hash = '#/job-detail/' + manualAddStatus.jobId; }}
                >View Job &rarr;</a>
              )}
            </p>
          )}
        </div>
      )}
      </>}

      {jobDetailId ? <JobDetailPage job={jobs.find(j => j.id === jobDetailId)} appPlans={appPlans} saveAppPlans={saveAppPlans} changeStatus={changeStatus} onBack={() => { if (window.history.length > 1) window.history.back(); else window.location.hash = '#/jobs'; }} /> : batchDetailDate ? <BatchDetailView jobs={jobs} batchDate={batchDetailDate} onBack={() => setBatchDetailDate(null)} appPlans={appPlans} saveAppPlans={saveAppPlans} /> : view === "stats" ? <StatsPanel jobs={jobs} appPlans={appPlans} saveAppPlans={saveAppPlans} /> : view === "pipeline" ? <PipelineView jobs={jobs} changeStatus={changeStatus} /> : view === "sankey" ? <SankeyView jobs={jobs} /> : view === "plans" ? <PlansView jobs={jobs} planDetailId={planDetailId} /> : view === "profile" ? <ProfileView /> : <>

                    ["title", "Title"],
                    ["tier", "Tier"],
                    ["score", "Score"],
                    ["salary", "Salary"],
                    ["status", "Status"],

                  >

                        {j.favorited ? "\u2605" : "\u2606"}

                    </td>
                    <td className="px-3 py-2 font-medium text-gray-900 whitespace-nowrap">{j.company}</td>
                    <td className="px-3 py-2 text-gray-700 max-w-xs truncate">{j.title}</td>
                    <td className="px-3 py-2">
                      <span className={"px-1.5 py-0.5 rounded text-xs font-medium " + TIER_COLORS[j.tier]}>
                        {j.tier === "Strong Match" ? "Strong" : j.tier === "Weak Match" ? "Weak" : "Match"}
                      </span>
                    </td>
                    <td className="px-3 py-2 text-gray-600">
                      <span className="inline-flex items-center gap-1">
                        {j.score}
                        {j.ai_reasoning && (
                          <span className="text-fuchsia-500 text-xs" title="Scored by AI">&#129302;</span>
                        )}
                      </span>
                    </td>
                    <td className="px-3 py-2 text-gray-600 whitespace-nowrap">{j.salary !== "N/A" ? j.salary : "-"}</td>
                    <td className="px-3 py-2">
                      <span className={"px-2 py-0.5 rounded text-xs font-medium " + (STATUS_COLORS[j.status] || "")}>
                        {j.status}
                      </span>
                      {j.live_status === "closed" && j.status !== "Applied, Closed, No Update" && j.status !== "Position Closed, No Application Submitted" && (
                        <span className="ml-1 px-1.5 py-0.5 rounded text-xs font-medium bg-red-50 text-red-500 border border-red-200">Closed</span>

                    <td className="px-3 py-2 text-gray-500 text-xs whitespace-nowrap">{j.posted_date || "-"}</td>
                    <td className="px-1 py-2">
                      <button
                        onClick={e => { e.stopPropagation(); if (confirm('Delete ' + j.company + ' \u2014 ' + j.title + '?')) { fetch('/api/delete-jobs', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ids: [j.id]}) }).then(() => window.location.reload()); }}}

            Showing {filtered.length} of {jobs.length} positions

        {selectedJob && (
          <div className="w-96 bg-white border-l flex-shrink-0 detail-scroll">
            <div className="p-4 border-b bg-gray-50">
              <div className="flex justify-between items-start">
                <div>
                  <h2 className="font-bold text-gray-900">{selectedJob.company}</h2>
                  <p className="text-sm text-gray-600">{selectedJob.title}</p>
                </div>
                <button onClick={() => setSelectedId(null)} className="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
              </div>
              <div className="flex items-center gap-2 mt-2">
                <span className={"inline-block px-2 py-0.5 rounded text-xs font-medium " + TIER_COLORS[selectedJob.tier]}>
                  {selectedJob.tier} (Score: {selectedJob.score})
                </span>
                <button
                  onClick={() => toggleFavorite(selectedJob.id)}
                  className={"text-lg " + (selectedJob.favorited ? "text-yellow-400" : "text-gray-300 hover:text-yellow-300")}
                  title={selectedJob.favorited ? "Remove from shortlist" : "Add to shortlist"}
                >
                  {selectedJob.favorited ? "\u2605" : "\u2606"}
                </button>
              </div>
            </div>

            <div className="p-4 space-y-4">
              {/* Metadata */}
              <div className="grid grid-cols-2 gap-2 text-sm">
                <div>
                  <span className="text-gray-400 text-xs">Salary</span>
                  <p className="font-medium">{selectedJob.salary !== "N/A" ? selectedJob.salary : "Not listed"}</p>

                <div>
                  <span className="text-gray-400 text-xs">Location</span>
                  <p className="font-medium">{selectedJob.location || "Not listed"}</p>
                </div>
                <div>
                  <span className="text-gray-400 text-xs">Work Type</span>
                  <p className="font-medium">{selectedJob.work_type || "Not listed"}</p>
                </div>
                <div>
                  <span className="text-gray-400 text-xs">Posted</span>
                  <p className="font-medium">{selectedJob.posted_date || "Unknown"}</p>

                <div className="col-span-2">
                  <span className="text-gray-400 text-xs">Applicants</span>

              <div>

                <select
                  value={selectedJob.status}

                  className={"w-full px-3 py-2 border rounded text-sm font-medium " + (STATUS_COLORS[selectedJob.status] || "")}
                >
                  {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>

              {/* Timeline */}
              {Object.keys(selectedJob.timestamps).length > 0 && (
                <div>
                  <h3 className="text-xs text-gray-400 mb-2">Status Timeline</h3>
                  <div className="space-y-1">
                    {STATUSES.filter(s => selectedJob.timestamps[s]).map((s, i, arr) => {
                      const ts = selectedJob.timestamps[s];
                      const d = new Date(ts);
                      const dateStr = d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"});
                      // Time since previous
                      let diff = null;
                      if (i > 0) {
                        const prevTs = selectedJob.timestamps[arr[i-1]];
                        if (prevTs) {
                          const days = Math.round((ts - prevTs) / (1000*60*60*24) * 10) / 10;
                          diff = days + "d";
                        }
                      }
                      return (
                        <div key={s} className="flex items-center gap-2 text-xs">
                          <span className={"w-2 h-2 rounded-full flex-shrink-0 " + (STATUS_COLORS[s]?.split(" ")[0] || "bg-gray-300")}></span>
                          <span className="font-medium w-24">{s}</span>
                          <span className="text-gray-500">{dateStr}</span>
                          {diff && <span className="text-gray-400 ml-1">({diff})</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* AI Reasoning */}
              {selectedJob.ai_reasoning && (
                <div className="bg-fuchsia-50 rounded border border-fuchsia-200 p-2">
                  <div className="text-xs font-semibold text-fuchsia-700 mb-1">&#129302; AI Reasoning</div>
                  <p className="text-xs text-gray-700 leading-relaxed">{selectedJob.ai_reasoning}</p>
                </div>
              )}

              {/* Notes */}
              <div>
                <label className="text-xs text-gray-400 block mb-1">Notes</label>
                <textarea
                  value={selectedJob.notes}
                  onChange={e => updateJob(selectedJob.id, { notes: e.target.value })}
                  placeholder="Add notes about this position..."
                  className="w-full px-3 py-2 border rounded text-sm h-28 resize-none"
                />
              </div>

              {/* Links */}
              <div className="flex gap-2 flex-wrap">
                {selectedJob.apply_link && (
                  <a href={selectedJob.apply_link} target="_blank" rel="noopener"
                    className="px-3 py-1.5 bg-blue-600 text-white rounded text-xs font-medium hover:bg-blue-700">
                    Apply
                  </a>
                )}
                {selectedJob.job_link && (
                  <a href={selectedJob.job_link} target="_blank" rel="noopener"
                    className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded text-xs font-medium hover:bg-gray-200 border">
                    LinkedIn Posting
                  </a>
                )}
                <button onClick={() => window._showResume && window._showResume(selectedJob.resume_path, selectedJob.company, selectedJob.title, selectedJob.id)}
                  className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded text-xs font-medium hover:bg-gray-200 border">
                  View Resume
                </button>
                <button onClick={() => window._openAIChat && window._openAIChat(selectedJob.id, selectedJob.company + ' — ' + selectedJob.title)}
                  className="px-3 py-1.5 bg-purple-600 text-white rounded text-xs font-medium hover:bg-purple-700">
                  Ask AI
                </button>
                <button onClick={() => { window.location.hash = '#/job-detail/' + selectedJob.id; }}
                  className="px-3 py-1.5 bg-gray-800 text-white rounded text-xs font-medium hover:bg-gray-900">
                  Full Page &#8599;
                </button>
              </div>

              {/* Add to Plan */}
              {appPlans.length > 0 && (() => {
                const currentPlan = appPlans.find(p => p.jobs.some(pj => pj.id === selectedJob.id));
                return (
                  <select value={currentPlan ? currentPlan.id : ""} onClick={e => e.stopPropagation()}
                    onChange={e => {
                      e.stopPropagation();
                      const targetId = e.target.value;
                      // Remove from all plans first
                      let updated = appPlans.map(p => ({ ...p, jobs: p.jobs.filter(pj => pj.id !== selectedJob.id) }));
                      // If a plan was selected, add to it
                      if (targetId) {
                        updated = updated.map(p => p.id === targetId
                          ? { ...p, jobs: [...p.jobs, { id: selectedJob.id, company: selectedJob.company, title: selectedJob.title, notes: '' }] }
                          : p
                        );
                      }
                      saveAppPlans(updated);
                    }}
                    className={"w-full px-3 py-2 rounded text-sm font-medium border cursor-pointer " + (currentPlan ? "bg-green-50 text-green-700 border-green-300" : "bg-gray-100 text-gray-700 hover:bg-gray-200")}>
                    <option value="">Add to Plan...</option>
                    {appPlans.map(p => {
                      const already = p.jobs.some(pj => pj.id === selectedJob.id);
                      return <option key={p.id} value={p.id} >{p.title}{already ? ' ✓' : ''}</option>;
                    })}
                  </select>
                );
              })()}

              {/* PDF Resume Preview & Upload */}
              <div className="border-t pt-3">
                <div className="flex items-center justify-between mb-2">
                  <label className="text-xs text-gray-400">PDF Resume</label>
                  {selectedJob.pdf_path && (
                    <a href={selectedJob.pdf_path} target="_blank" rel="noopener"
                      className="text-xs text-blue-500 hover:text-blue-700 underline">
                      Open in new tab
                    </a>
                  )}
                </div>
                {selectedJob.pdf_path ? (
                  <div className="mb-2 rounded border overflow-hidden" style={{height: '400px'}}>
                    <iframe
                      src={selectedJob.pdf_path}
                      className="w-full h-full"
                      style={{border: 'none'}}
                      title="Resume Preview"
                    />
                  </div>
                ) : null}
                <div
                  onDragOver={e => { e.preventDefault(); e.stopPropagation(); e.currentTarget.dataset.dragging = "true"; e.currentTarget.className = e.currentTarget.className.replace('border-gray-200', 'border-blue-400').replace('text-gray-400', 'text-blue-600').replace('bg-white', 'bg-blue-50'); }}
                  onDragLeave={e => { e.preventDefault(); e.stopPropagation(); e.currentTarget.dataset.dragging = "false"; e.currentTarget.className = e.currentTarget.className.replace('border-blue-400', 'border-gray-200').replace('text-blue-600', 'text-gray-400').replace('bg-blue-50', 'bg-white'); }}
                  onDrop={e => {
                    e.preventDefault(); e.stopPropagation();
                    e.currentTarget.className = e.currentTarget.className.replace('border-blue-400', 'border-gray-200').replace('text-blue-600', 'text-gray-400').replace('bg-blue-50', 'bg-white');
                    const file = e.dataTransfer.files[0];
                    if (file && file.name.toLowerCase().endsWith('.pdf')) {
                      uploadPdfFile(selectedJob, file);
                    }
                  }}
                  className="rounded border-2 border-dashed border-gray-200 px-4 py-3 text-center text-xs text-gray-400 bg-white transition-colors cursor-pointer hover:border-gray-300">
                  {selectedJob.pdf_path ? 'Drop PDF to replace' : 'Drop PDF resume here'}
                  <label className="ml-2 text-blue-500 hover:text-blue-700 cursor-pointer underline">
                    or browse
                    <input type="file" accept=".pdf" className="hidden" onChange={e => handlePdfUpload(selectedJob, e)} />
                  </label>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </>
    }
    </div>
  );
}

// ── Job Detail Modal (global, usable from Pipeline and any component) ──
function JobDetailModal() {
  const [jobId, setJobId] = useState(null);
  const [refreshKey, setRefreshKey] = useState(0);
  const [descCache, setDescCache] = useState({});
  const [companyCache, setCompanyCache] = useState({});
  const [localNotes, setLocalNotes] = useState('');

  useEffect(() => {
    window._showJobDetail = (id) => {
      setJobId(id);
      setRefreshKey(k => k + 1);
      const j = window._getJobById && window._getJobById(id);
      setLocalNotes(j ? (j.notes || '') : '');
      // Fetch description on demand
      if (!descCache[id]) {
        setDescCache(prev => ({ ...prev, [id]: { loading: true } }));
        fetch('/api/job-description/' + id)
          .then(r => r.json())
          .then(data => setDescCache(prev => ({ ...prev, [id]: { html: data.formatted || '', text: data.description || 'No description available.' } })))
          .catch(() => setDescCache(prev => ({ ...prev, [id]: { error: true } })));
      }
    };
    return () => { delete window._showJobDetail; };
  }, [descCache]);

  // Fetch company info when jobId changes
  useEffect(() => {
    if (!jobId) return;
    const job = window._getJobById && window._getJobById(jobId);
    if (!job) return;
    const key = job.company.trim().toLowerCase();
    if (companyCache[key]) return;
    setCompanyCache(prev => ({ ...prev, [key]: { loading: true } }));
    fetch('/api/company-info/' + encodeURIComponent(job.company))
      .then(r => r.json())
      .then(data => setCompanyCache(prev => ({ ...prev, [key]: data })))
      .catch(() => setCompanyCache(prev => ({ ...prev, [key]: { error: true } })));
  }, [jobId, refreshKey]);

  if (!jobId) return null;
  const job = window._getJobById && window._getJobById(jobId);
  if (!job) return null;

  const desc = descCache[jobId];
  const companyKey = job.company.trim().toLowerCase();
  const companyInfo = companyCache[companyKey];

  const close = () => setJobId(null);

  return (
    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
         onClick={close}>

           style={{maxHeight: '90vh'}}
           onClick={e => e.stopPropagation()}>
        {/* Header */}
        <div className="p-4 border-b bg-gray-50 rounded-t-lg">
          <div className="flex justify-between items-start">
            <div>
              <h2 className="font-bold text-gray-900">{job.company}</h2>
              <p className="text-sm text-gray-600">{job.title}</p>
            </div>
            <button onClick={close} className="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
          </div>
          <div className="flex items-center gap-2 mt-2">
            <span className={"inline-block px-2 py-0.5 rounded text-xs font-medium " + TIER_COLORS[job.tier]}>
              {job.tier} (Score: {job.score})
            </span>
            <button
              onClick={() => { window._toggleFavorite && window._toggleFavorite(job.id); setRefreshKey(k => k + 1); }}
              className={"text-lg " + (job.favorited ? "text-yellow-400" : "text-gray-300 hover:text-yellow-300")}
              title={job.favorited ? "Remove from shortlist" : "Add to shortlist"}
            >
              {job.favorited ? "\u2605" : "\u2606"}
            </button>
          </div>
        </div>

        {/* Scrollable body */}
        <div className="flex-1 overflow-auto p-4 space-y-4" style={{minHeight: 0}}>
          {/* Metadata */}
          <div className="grid grid-cols-3 gap-3 text-sm">
            <div>
              <span className="text-gray-400 text-xs">Salary</span>
              <p className="font-medium">{job.salary !== "N/A" ? job.salary : "Not listed"}</p>
            </div>
            <div>
              <span className="text-gray-400 text-xs">Location</span>
              <p className="font-medium">{job.location || "Not listed"}</p>
            </div>
            <div>
              <span className="text-gray-400 text-xs">Work Type</span>
              <p className="font-medium">{job.work_type || "Not listed"}</p>
            </div>
            <div>
              <span className="text-gray-400 text-xs">Posted</span>
              <p className="font-medium">{job.posted_date || "Unknown"}</p>
            </div>
            <div>
              <span className="text-gray-400 text-xs">Applicants</span>
              <p className="font-medium">{job.applicants || "Unknown"}</p>
            </div>
            <div>
              <span className="text-gray-400 text-xs">ID</span>
              <p className="font-medium text-gray-400">{job.id.slice(0, 12)}</p>
            </div>
          </div>

          {/* AI Reasoning */}
          {job.ai_reasoning && (
            <div className="bg-fuchsia-50 rounded border border-fuchsia-200 p-2">
              <div className="text-xs font-semibold text-fuchsia-700 mb-1">&#129302; AI Reasoning</div>
              <p className="text-xs text-gray-700 leading-relaxed">{job.ai_reasoning}</p>
            </div>
          )}

          {/* Status */}
          <div>
            <label className="text-xs text-gray-400 block mb-1">Application Status</label>
            <select
              value={job.status}
              onChange={e => { window._changeStatus && window._changeStatus(job.id, e.target.value); setRefreshKey(k => k + 1); }}
              className={"w-full px-3 py-2 border rounded text-sm font-medium " + (STATUS_COLORS[job.status] || "")}
            >
              {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>

          {/* Timeline */}
          {Object.keys(job.timestamps).length > 0 && (
            <div>
              <h3 className="text-xs text-gray-400 mb-2">Status Timeline</h3>
              <div className="space-y-1">
                {STATUSES.filter(s => job.timestamps[s]).map((s, i, arr) => {
                  const ts = job.timestamps[s];
                  const d = new Date(ts);
                  const dateStr = d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"});
                  let diff = null;
                  if (i > 0) {
                    const prevTs = job.timestamps[arr[i-1]];
                    if (prevTs) {
                      const days = Math.round((ts - prevTs) / (1000*60*60*24) * 10) / 10;
                      diff = days + "d";
                    }
                  }
                  return (
                    <div key={s} className="flex items-center gap-2 text-xs">
                      <span className={"w-2 h-2 rounded-full flex-shrink-0 " + (STATUS_COLORS[s]?.split(" ")[0] || "bg-gray-300")}></span>
                      <span className="font-medium w-24">{s}</span>
                      <span className="text-gray-500">{dateStr}</span>
                      {diff && <span className="text-gray-400 ml-1">({diff})</span>}

          <div>

              value={localNotes}

              onBlur={() => { window._updateJob && window._updateJob(job.id, { notes: localNotes }); }}
              placeholder="Add notes about this position..."
              className="w-full px-3 py-2 border rounded text-sm h-28 resize-none"
            />
          </div>

          {/* Description + Company Info side by side */}
          <div className="flex gap-4">
            <div className="flex-1 min-w-0">
              <span className="text-xs text-gray-400 block mb-1">Description</span>
              {desc ? (
                desc.loading ? (

                  <p className="text-xs text-red-400">Failed to load description.</p>
                ) : desc.html ? (
                  <div className="bg-gray-50 border rounded p-3 max-h-64 overflow-auto max-w-2xl text-xs"
                    dangerouslySetInnerHTML={{ __html: desc.html }} />
                ) : (
                  <div className="text-xs text-gray-700 bg-gray-50 border rounded p-2 max-h-48 overflow-auto whitespace-pre-wrap max-w-2xl">{desc.text}</div>
                )
              ) : (
                <p className="text-xs text-gray-400">Click to load description</p>
              )}
            </div>
            {companyInfo && !companyInfo.loading && !companyInfo.error && (
              <div className="w-64 flex-shrink-0">
                <span className="text-xs text-gray-400 block mb-1">Company</span>
                <div className="bg-gray-50 border rounded p-3 max-h-64 overflow-auto">
                  <div className="flex items-center gap-2 mb-2">
                    <img src={companyInfo.logo_url} alt={companyInfo.name + ' logo'}
