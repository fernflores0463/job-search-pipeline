                      onError={(e) => { e.target.style.display = 'none'; }} />
                    <div>
                      <p className="font-semibold text-sm text-gray-900">{companyInfo.name}</p>
                      {companyInfo.industry && <p className="text-xs text-blue-600">{companyInfo.industry}</p>}
                    </div>
                  </div>
                  {companyInfo.known_for && (
                    <p className="text-xs text-gray-700 mb-2 leading-relaxed">{companyInfo.known_for}</p>
                  )}
                  {companyInfo.website && (
                    <a href={'https://' + companyInfo.website} target="_blank" rel="noopener"
                      className="text-xs text-blue-500 hover:underline mt-1 block">{companyInfo.website}</a>
                  )}
                </div>
              </div>
            )}
          </div>

          {/* Links */}
          <div className="flex gap-2 flex-wrap items-center">
            {job.apply_link && (
              <a href={job.apply_link} target="_blank" rel="noopener"
                className="px-3 py-1.5 bg-blue-600 text-white rounded text-xs font-medium hover:bg-blue-700">
                Apply
              </a>
            )}
            {job.job_link && (
              <a href={job.job_link} target="_blank" rel="noopener"
                className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded text-xs font-medium hover:bg-gray-200 border">
                LinkedIn Posting
              </a>
            )}
            {job.resume_path && (
              <button onClick={() => window._showResume && window._showResume(job.resume_path, job.company, job.title, job.id)}
                className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded text-xs font-medium hover:bg-gray-200 border">
                View Resume
              </button>
            )}
            <button
              onClick={e => {
                navigator.clipboard.writeText(window.__APP_CONFIG.linkedin_url || '').then(() => {
                  e.target.textContent = 'Copied!';
                  setTimeout(() => { e.target.textContent = 'Copy My LinkedIn'; }, 1500);
                });
              }}
              className="px-2.5 py-1 bg-blue-100 text-blue-700 rounded text-xs font-medium hover:bg-blue-200 border border-blue-200">
              Copy My LinkedIn
            </button>
            <button
              onClick={() => { setJobId(null); window.location.hash = '#/job-detail/' + job.id; }}
              className="px-3 py-1.5 bg-gray-800 text-white rounded text-xs font-medium hover:bg-gray-900">
              Full Page &#8599;
            </button>
          </div>

          {/* PDF Resume */}
          <div className="border-t pt-3">
            <label className="text-xs text-gray-400 block mb-2">PDF Resume</label>
            {job.pdf_path ? (
              <div className="flex gap-2 items-center">
                <a href={'/' + job.pdf_path} target="_blank" rel="noopener"
                  className="px-3 py-1.5 bg-green-600 text-white rounded text-xs font-medium hover:bg-green-700">
                  View PDF Resume
                </a>
                <label className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded text-xs font-medium hover:bg-gray-200 border cursor-pointer">
                  Replace
                  <input type="file" accept=".pdf" className="hidden" onChange={e => { window._handlePdfUpload && window._handlePdfUpload(job, e); setRefreshKey(k => k + 1); }} />
                </label>
              </div>
            ) : (
              <label className="inline-block px-3 py-1.5 bg-gray-100 text-gray-700 rounded text-xs font-medium hover:bg-gray-200 border cursor-pointer">
                Upload PDF
                <input type="file" accept=".pdf" className="hidden" onChange={e => { window._handlePdfUpload && window._handlePdfUpload(job, e); setRefreshKey(k => k + 1); }} />
              </label>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Resume Preview Modal (global, usable from any component) ─────────
function ResumePreviewModal() {
  const [data, setData] = useState(null);
  const [copiedIdx, setCopiedIdx] = useState(null);

  React.useEffect(() => {
    window._showResume = (path, company, title, jobId) => {
      setCopiedIdx(null);
      setData({ path, company, title, text: null, loading: true, error: null });
      // If we have a job ID and the server is running, fetch resume_text from DB
      const apiUrl = (IS_SERVED && jobId) ? '/api/resume-text/' + encodeURIComponent(jobId) : null;
      const fileUrl = path ? '/' + path : null;
      const fetchUrl = apiUrl || fileUrl;
      if (!fetchUrl) {
        setData(prev => ({ ...prev, error: 'No resume available', loading: false }));
        return;
      }
      fetch(fetchUrl)
        .then(r => {
          if (!r.ok) {
            // If API failed and we have a file path, try that as fallback
            if (apiUrl && fileUrl) {
              return fetch(fileUrl).then(r2 => {
                if (!r2.ok) throw new Error('Failed to load');
                return r2.text();
              });
            }
            throw new Error('Failed to load');
          }
          return r.text();
        })
        .then(text => setData(prev => ({ ...prev, text, loading: false })))
        .catch(err => setData(prev => ({ ...prev, error: err.message, loading: false })));
    };
    return () => { delete window._showResume; };
  }, []);

  // Parse resume text into named sections
  // Format: "SECTION NAME\n------ (or ======)\ncontent..."
  const sections = useMemo(() => {
    if (!data?.text) return [];
    const lines = data.text.split('\n');
    const secs = [];
    let currentName = null;
    let currentLines = [];

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      // Detect separator line (all dashes or equals, at least 10 chars)
      if (/^[-=]{10,}$/.test(line.trim()) && i > 0) {
        // The line immediately before the separator is the section name
        const headerLine = currentLines.pop();
        // Save accumulated content (minus the header line) as the previous section
        const content = currentLines.join('\n').trim();
        if (currentName !== null && content) {
          secs.push({ name: currentName, content });
        }
        currentName = headerLine?.trim() || 'Section';
        currentLines = [];
        continue;
      }
      currentLines.push(line);
    }
    // Push last section
    const lastContent = currentLines.join('\n').trim();
    if (lastContent) secs.push({ name: currentName || 'Content', content: lastContent });

    return secs;
  }, [data?.text]);

  const copyToClipboard = (text, idx) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopiedIdx(idx);
      setTimeout(() => setCopiedIdx(null), 1500);
    });
  };

  if (!data) return null;

  return (
    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
         onClick={() => setData(null)}>
      <div className="bg-white rounded-lg shadow-xl w-full max-w-5xl flex flex-col"
           style={{maxHeight: '90vh'}}
           onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center p-4 border-b bg-gray-50 rounded-t-lg">
          <div>
            <h3 className="font-bold text-gray-900 text-sm">{data.company}</h3>
            <p className="text-xs text-gray-500">{data.title}</p>
          </div>
          <button onClick={() => setData(null)}
            className="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
        </div>
        <div className="flex-1 overflow-auto p-4 space-y-3" style={{minHeight: 0}}>
          {data.loading && <p className="text-sm text-gray-400 text-center py-8">Loading resume...</p>}
          {data.error && <p className="text-sm text-red-500 text-center py-8">{data.error}</p>}
          {data.text && sections.map((sec, idx) => {
            const lineCount = sec.content.split('\n').length;
            const rows = Math.min(Math.max(lineCount + 1, 3), 14);
            return (
              <div key={idx} className="border rounded-lg overflow-hidden">
                <div className="flex justify-between items-center px-3 py-2 bg-gray-100 border-b">
                  <span className="text-xs font-semibold text-gray-700 uppercase tracking-wide">{sec.name}</span>
                  <button onClick={() => copyToClipboard(sec.content, idx)}
                    className={'text-xs px-2 py-1 rounded ' + (copiedIdx === idx
                      ? 'bg-green-100 text-green-700'
                      : 'bg-white text-gray-600 hover:bg-gray-200 border')}>
                    {copiedIdx === idx ? 'Copied!' : 'Copy'}
                  </button>
                </div>
                <textarea readOnly value={sec.content} rows={rows}
                  className="w-full text-sm text-gray-800 font-mono bg-gray-50 p-3 resize-none focus:outline-none"
                  style={{cursor: 'default'}} />
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── AI Chat Panel (Ollama-powered local assistant) ──
function AIChatPanel() {
  const [open, setOpen] = useState(false);
  const [jobId, setJobId] = useState(null);
  const [jobLabel, setJobLabel] = useState('');
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [thinking, setThinking] = useState(false);
  const [model, setModel] = useState('qwen2.5:7b');
  const [minimized, setMinimized] = useState(false);
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    window._openAIChat = (id, label) => {
      setJobId(id || null);
      setJobLabel(label || '');
      setOpen(true);
      setMessages([]);
      setTimeout(() => inputRef.current?.focus(), 100);
    };
    return () => { delete window._openAIChat; };
  }, []);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, thinking]);

  const sendMessage = useCallback(async (text) => {
    if (!text.trim() || thinking) return;
    const userMsg = { role: 'user', content: text.trim() };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput('');
    setThinking(true);
    try {
      const res = await fetch('/api/ai-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: userMsg.content,
          job_id: jobId,
          history: messages,
          model: model,
        }),
      });
      const data = await res.json();
      if (data.error) {
        setMessages(prev => [...prev, { role: 'assistant', content: 'Error: ' + data.error }]);
      } else {
        setMessages(prev => [...prev, { role: 'assistant', content: data.response }]);
      }
    } catch (err) {
      setMessages(prev => [...prev, { role: 'assistant', content: 'Error: Could not connect to AI. Is Ollama running?' }]);
    }
    setThinking(false);
  }, [messages, jobId, thinking, model]);

  const quickPrompts = [
    { label: 'Analyze Job', prompt: 'Analyze this job posting. What are the key requirements, and how well does my background fit? Highlight any gaps.' },
    { label: 'Tailor Resume', prompt: 'How should I tailor my resume for this specific role? Give me specific bullet point suggestions.' },
    { label: 'Interview Prep', prompt: 'What technical and behavioral interview questions should I expect for this role? Give me 5 of each.' },
    { label: 'Cover Letter', prompt: 'Draft a concise cover letter for this position that highlights my most relevant experience.' },
  ];

  if (!open) {
    return (
      <button
        onClick={() => { setOpen(true); setMinimized(false); setTimeout(() => inputRef.current?.focus(), 100); }}
        className="fixed bottom-6 right-6 w-14 h-14 bg-purple-600 text-white rounded-full shadow-lg hover:bg-purple-700 flex items-center justify-center text-2xl z-40"
        title="AI Assistant">
        AI
      </button>
    );
  }

  if (minimized) {
    return (
      <div className="fixed bottom-6 right-6 bg-purple-600 text-white rounded-lg shadow-lg z-50 flex items-center gap-2 px-4 py-2 cursor-pointer hover:bg-purple-700"
        onClick={() => { setMinimized(false); setTimeout(() => inputRef.current?.focus(), 100); }}>
        <span className="font-bold text-sm">AI Assistant</span>
        {jobLabel && <span className="text-xs text-purple-200 truncate" style={{maxWidth:'150px'}}>— {jobLabel}</span>}
        {thinking && <span className="text-xs text-purple-200 animate-pulse">thinking...</span>}
        {messages.length > 0 && <span className="bg-purple-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{messages.length}</span>}
      </div>
    );
  }

  return (
    <div className="fixed bottom-0 right-0 w-full sm:w-[32rem] h-full sm:h-3/4 bg-white border-l sm:border shadow-2xl flex flex-col z-50 sm:rounded-tl-lg sm:bottom-0 sm:right-0" style={{maxHeight: '85vh'}}>
      {/* Header */}
      <div className="p-3 bg-purple-600 text-white flex items-center justify-between sm:rounded-tl-lg flex-shrink-0">
        <div>
          <h3 className="font-bold text-sm">AI Assistant</h3>
          {jobLabel && <p className="text-xs text-purple-200 truncate" style={{maxWidth:'200px'}}>{jobLabel}</p>}
          {!jobLabel && <p className="text-xs text-purple-200">General mode — select a job for context</p>}
        </div>
        <div className="flex gap-2 items-center">
          <select value={model} onChange={e => setModel(e.target.value)}
            className="text-xs bg-purple-500 text-white px-1 py-1 rounded border-purple-400 border">
            <option value="qwen2.5:7b">7B Fast</option>
            <option value="qwen2.5:14b">14B Quality</option>
          </select>
          {jobId && (
            <button onClick={() => { setJobId(null); setJobLabel(''); }}
              className="text-xs bg-purple-500 hover:bg-purple-400 px-2 py-1 rounded">Clear context</button>
          )}
          <button onClick={() => setMinimized(true)} className="text-purple-200 hover:text-white text-xl leading-none" title="Minimize">&minus;</button>
          <button onClick={() => setOpen(false)} className="text-purple-200 hover:text-white text-xl leading-none" title="Close">&times;</button>
        </div>
      </div>

      {/* Messages */}
      <div className="flex-1 overflow-y-auto p-3 space-y-3" style={{minHeight: 0}}>
        {messages.length === 0 && !thinking && (
          <div className="text-center text-gray-400 text-sm mt-8">
            <p className="mb-4">{jobId ? 'Ask me about this position' : 'Ask me anything about your job search'}</p>
            {jobId && (
              <div className="flex flex-wrap gap-2 justify-center">
                {quickPrompts.map((qp, i) => (
                  <button key={i} onClick={() => sendMessage(qp.prompt)}
                    className="px-3 py-1.5 bg-purple-50 text-purple-700 rounded-full text-xs font-medium hover:bg-purple-100 border border-purple-200">
                    {qp.label}
                  </button>
                ))}
              </div>
            )}
          </div>
        )}

        {messages.map((msg, i) => (
          <div key={i} className={msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'}>
            {msg.role === 'user' ? (
              <div className="bg-purple-600 text-white rounded-lg px-3 py-2 max-w-sm sm:max-w-md text-sm whitespace-pre-wrap">
                {msg.content}
              </div>
            ) : (
              <div className="bg-gray-100 text-gray-800 rounded-lg px-3 py-2 max-w-sm sm:max-w-md text-sm ai-response"
                dangerouslySetInnerHTML={{ __html: renderMarkdown(msg.content) }} />
            )}
          </div>
        ))}

        {thinking && (
          <div className="flex justify-start">
            <div className="bg-gray-100 text-gray-500 rounded-lg px-3 py-2 text-sm animate-pulse">
              Thinking...
            </div>
          </div>
        )}
        <div ref={messagesEndRef} />
      </div>

      {/* Quick prompts row (shown after conversation starts, when job context exists) */}
      {messages.length > 0 && jobId && (
        <div className="px-3 py-1 border-t flex gap-1 flex-wrap flex-shrink-0">
          {quickPrompts.map((qp, i) => (
            <button key={i} onClick={() => sendMessage(qp.prompt)} disabled={thinking}
              className="px-2 py-1 bg-purple-50 text-purple-600 rounded text-xs hover:bg-purple-100 disabled:opacity-50">
              {qp.label}
            </button>
          ))}
        </div>
      )}

      {/* Input */}
      <div className="p-3 border-t flex gap-2 flex-shrink-0">
        <input
          ref={inputRef}
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input); } }}
          placeholder={thinking ? 'Waiting for response...' : 'Ask about this job...'}
          disabled={thinking}
          className="flex-1 px-3 py-2 border rounded text-sm disabled:bg-gray-50"
        />
        <button
          onClick={() => sendMessage(input)}
          disabled={thinking || !input.trim()}
          className="px-4 py-2 bg-purple-600 text-white rounded text-sm font-medium hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed">
          Send
        </button>
      </div>
    </div>
  );
}

ReactDOM.render(<><App /><JobDetailModal /><ResumePreviewModal /><AIChatPanel /></>, document.getElementById("root"));
</script>
</body>
</html>
